body:
  text: 淮海參佛弟子蘊空居士陸西星述旨廣陵後學陳遇時校定特表耳根第二十一此卷特表耳根圓通二十五門此最當機故須特標爾時觀世音菩薩即從座起至從聞思修入三摩地謂從三慧入圓通也達耳之謂聞著心之謂思治習之謂修三者圓明是謂三慧初於聞中入流亡所所入既寂動靜二相了然不生金剛經云須陀洹名為入流而無所入今云入流亡所是此菩薩亦自陀洹初果修來故曰初於其後以次升進聞中入流者聞謂聲塵流謂法性謂初以聲塵入吾法性之中而實亡所入亡所入即金剛經所謂入流而無所入也亡所入則外境不入矣所即能所之所入有能所此但亡所然而法性之中體自常寂本無動塵安有靜相既亡所入則見動靜二相了然不生了然者覺也覺其不生此時尚有覺在有入有亡有寂有覺未為究竟如是漸增聞所聞盡至生滅既滅寂滅現前外塵易亡內根難盡如是亡所工夫以漸增進使能聞所聞一時俱盡則內外兩亡境智俱泯然而本覺真空無有少法可得亡所盡聞特思修之法耳今也盡聞之法亦復不住但覺所覺者空則空覺圓成矣尚有覺在至於覺所覺空空所空滅生滅既滅寂滅現前造詣至此則圓通智體於是為至按此段文以亡盡空滅為義而工夫有淺深乃聖修之漸次正與清淨經觀空亦空寂無所寂等語同一意旨盡者盡其所亡也空者空其所盡也滅者滅其所空也滅有二義有對生而言滅者有以無生而言滅者故云生滅既滅寂滅現前即涅槃經所謂生滅滅已寂滅為樂也溫陵分為四義一亡前塵二淨內根三空觀智四滅諦理其義良是忽然超越世出世間至三十二應入諸國土根境圓融故世出世間不能限礙而十方法界無不圓明洞達以故上合諸佛則愍物興慈應機成就即下之三十二應者是下合羣生故知其悲仰隨與拯即下十四無畏者是世尊若諸菩薩入三摩地至而為說法令其解脫三十二應所指者四聖六凡四聖一佛二辟支三緣覺四聲聞凡四解脫佛者修正定取正果勝解現圓辟支以下皆謂之有學小聲聞寂靜妙明勝妙現圓謂之獨覺緣覺者觀十二因緣而悟道緣所緣性勝妙現圓聲聞者得四諦空修道入滅勝性現圓解脫與成就不同解脫則有超進成就但成就其能事而已此聖人因材而篤之教也若諸眾生欲心明悟至無作妙力自在成就六凡一梵王二帝釋天主釋提桓因三自在天身欲頂他化自在天四大自在天身色頂摩醘首羅五天大將軍帝釋上將四天主身臣於帝釋六四天太子身那吒太子之類凡六成就二人一人王皇帝及邦國小臣二長者有十德為世所推讓三居士愛談名理四宰官剖斷邦邑凡四成就一婆羅門梵志術數凡一成就一比丘僧二比丘尼出家修行凡二成就一優婆塞近事男二優婆夷近事女在家修行凡二成就一婦女身主婦以下至婆羅門女主即后妃也命婦即公矦之妻大家后妃之傅凡一成就一童男二童女凡二成就以上共十二成就三八部神一諸天二諸龍三藥叉夜义四乾闥婆高竿樂神五阿修羅魔王六緊那羅歌神頭有二角七摩呼羅伽蟒身八迦樓那金翅鳥此脫凡八成就一人通指眾生樂修人道者二非人通指有形無形有想無想休咎精明空散消沉之類凡二成就以上共三十二成就觀世音慈悲之心無不護念圓通之力無不加被故下復有十四無畏功德而此菩薩於娑婆世界號之為施無畏者無畏何以施人葢由己之真性妙圓十方洞達以故形神俱妙隔閡潛通所謂保始之徵無懼之實一夫雄入於九軍故十方國土一有信心稱名則此菩薩便以威神之力加而被之使之心無恐怖而其人蓋不自知也普門品世尊偈答無盡意菩薩與此同旨世尊我復以此聞熏聞修至觀其音聲即得解脫此下具舉十四無畏功德言自在菩薩三摩地中由聞思修而入者原有此等無畏功德故能以此普施於人使苦惱眾生各得解脫不自觀音以觀觀者此菩薩心法也不自觀音即前所謂聞中入流而亡所入者也以觀觀者倒旋聞機返照自性則見空覺極圓覺所空滅寂滅現前原無礙恐怖又何苦厄之不我度哉故能依怙眾生即得解脫觀其音聲音謂梵音海潮音勝彼世間音也以觀觀者觀乃真觀清淨觀廣大智慧觀也與普門偈答同一旨趣二者知見旋復令諸眾生至大水所漂水不能溺旋復者返照自性也知見者火之屬也觀聽者水之屬也楞嚴後卷見業交則見猛火聞業交則見波濤發真歸空則其人已無水火之業業緣不作則內無所召故外無所偶而水火自無焚溺之虞此處還作內境說者殊勝菩薩有此能事故能以此加被於人普門偈云假使興害意推落大火坑念彼觀音力火坑變成池或漂流巨海龍魚諸鬼難念彼觀音力波浪不能沒是此意也甞觀今之師巫邪術有所謂鐵布衫法者其呪甚鄙猥但朝夕祭賽吞符持行之久每一舉呪身中自覺有物作梗以試刀劒棍棒任其斫擊而體不能傷況菩薩之威神不可思議者乎此實理實事但信之不足者有不信耳四者斷滅妄想心無殺害至入諸鬼國鬼不能害普門偈云或遇惡羅剎毒龍諸鬼等念彼觀音力時悉不敢害溫陵云心無所召故境不能為旨其是矣五者熏聞成聞六根消復至亦如吹光性無搖動以聞慧熏其聞根以成圓聞一根既圓則六根消復同於聲聽無復形礙雖使加以兵刃猶如割水吹光性無動搖兵無所施其刃也故段段尋壞普門偈云或遭王難苦臨刑欲壽終念彼觀音力刀尋段段壞是也六者聞熏精明明徧法界至雖近其旁目不能視聞熏精明圓光通達故幽暗之鬼尚不能以惡眼視之況復加害藥叉三種一在地一在天一在虗空羅剎女住海中鳩槃茶魘魅鬼毗舍遮噉精氣鬼富單那熱病鬼七者音性圓消觀聽返入至禁繫伽鎻所不能著觀聽返入離諸塵妄故枷鎻之厄自不能著普門偈云或囚禁枷鎻手足被杻械念彼觀音力釋然得解脫是也八者滅音圓聞徧生慈力至經過險路賊不能劫滅音圓聞交通成和徧生慈力或有眾生齎持重寶經過險路一稱其名即得解脫意與普門偈同九者熏聞離塵色所不劫至多婬眾生遠離貪欲眾生以欲習合塵每為聲色所劫菩薩熏聞離塵能令多婬眾生遠離聲色雖有妖艶亶不能劫溫陵云性成則欲愛乾枯離塵則根境不偶是也十者純音無塵根境圓融至忿恨眾生離諸瞋恚無對故能離恚十一者消塵旋明法界身心至諸阿顛迦永離癡暗旋明故能離癡阿顛迦此云無善心內業有十而婬恚癡為甚故舉以例餘具見普門品十二者融形復聞不動道場至誕生福德智慧之男男以稟受為能女以順承為德菩薩之於法王亦復如是形融則隔閡潛通聞復則真性旋復故能不動道場而能涉入法界供養十方諸佛各各稟受其法嗣為法子將見福德以供佛而益增智慧以稟法而益長能令無子法界眾生求男得男福德智慧即與我同十三者六根圓通明照無二至眾人愛敬有相之女六根圓通明照不二是以十方法界含攝於大圓鏡智之中而如來真空藏體秘密法門領受無失有女道焉能令法界眾生求女生女端正有相亦與我同蓋彼以真感此以真應生男生女安得不與之同乎按白衣呪南無喝囉怛那哆囉夜耶南無阿利耶婆嚧羯帝鑠鉢囉耶菩提薩埵婆耶摩訶薩埵婆耶摩訶迦嚧尼迦耶唵哆利哆唎咄哆唎咄咄哆唎咄咄咄哆唎娑婆訶樂官本十四者此三千大千世界至施無畏力福備眾生三千大千世界百億剎土即有百億日月百億剎土即有百億法王垂範立教各各不同故有六十二億恒河沙菩薩其大較也我以修習耳根圓通微妙法門含容法界無不周遍施以無畏功德能令眾生持我名號與彼供養恒河諸佛福等無異眾不為多一不為少何以故以圓通故世尊我又獲是圓通至故觀音名徧十方界前之現形應求功德猶可思議此復說言不可思議功德不可思議者不見其迹莫知其然不可得而測度擬議之也謂之無作功德乃吾圓融清淨寶覺能現眾多妙容能說無邊神呪其容其呪具足妙德能以無畏施於眾生徧於國土度其貪慳使施妙寶應其求請畢諧所願蓋由我得耳根圓通三昧故能成就菩提斯為第一爾時世尊於師子座至梵唄詠歌自然敷奏唄音拜溫陵註前說圓通之法此顯圓通之瑞而應之也諸佛五體同放寶光者表證性明極則寶覺圓融全體發現也互相灌頂者頂為圓極之相表諸佛證性圓極於此會中菩薩羅漢即二十四聖之儔佛光亦灌其頂者印其修證等無優劣也林木池沼皆演法音交光相羅者圓通現前則一切聲是佛聲一切色是佛色無非悟入之處無非圓通之理也大眾普獲金剛三昧者因此皆能破惑障悟圓通也天雨寶華空現寶色地隱山河界含塵剎者表證圓通性則無作妙行自然分披寶明空覺自然發現有為習漏當不復生眾塵廓然無復隔越也梵唄詠歌自然敷奏者能使法界永離眾苦常得妙樂也聖人所演圓通法門奧旨妙利詳悉若是故眾瑞詳而應之文殊說偈第二十二於是如來告文殊師利至承佛威神說偈對佛覺海性澄圓圓澄覺元妙覺湛性海本自澄圓標其體也圓澄之覺妙乎萬物標其用也此人人本具之圓通元明照生所所立照性亡從元妙中忽起妄明是曰元明妄有所照故生所所謂覺非所明因明立所也所明既立照性隨失迷妄有虗空因空立世界性真既隱空覺遂分根器二界悉因頑迷妄想安立想澄成國土知覺乃眾生妄想凝結則成無情國土妄識知覺則成有情眾生則彼澄妙者遂莫得而圓莫得而通矣空生大覺中至漚滅空本無況復諸三有牒上迷澄圓而成根器融根器則復歸澄圓言大覺海中本絕空有由微風飄鼓妄發空漚而諸有生焉迷風既息則空漚自滅所依諸有遂不可得而空覺圓融復歸元妙矣三有指微塵國中三有也歸元性無二至初心入三昧遲速不同倫二十五聖同一圓通故曰無二其曰多門方便法耳在夫聖性逆順皆通不容料揀其如初心遲速隨宜故須選擇色想結成塵精了不能徹如何不明徹於是獲圓通此下揀六塵也言色能起想結塵使精性不徹以故二十五聖所證之法門若非有如來加被之力焉獲圓通乎終不如觀音耳根之妙也音聲離言語但伊名句味一非合一切云何獲圓通聲性名句語言意味不該不徧非是以一而含一切者云何獲圓通問聞聲與觀音耳根何殊何故揀以為非答觀音不自觀音而返觀觀者是了自己心性不為聲塵所轉若作聞聲雖是佛語亦屬所聞香以合中知至合離性非定云何獲圓通三句即一意言味香觸皆在外與己性無干法稱為內塵憑塵非所有能所非徧涉云何獲圓通法塵無相獨意能緣是意為能緣法為所緣能於此者必不能於彼此為所緣則彼必非所緣故云非徧涉也見性雖洞然至支離非涉入云何獲圓通此下揀六根也眼虧四維鼻無交氣不名圓通舌非入無端因味生覺了味亡了無有云何獲圓通與前味塵意同身與所觸同各非圓覺觀涯量不冥會云何獲圓通見觸方觸不能以意觸故云不冥會知根雜亂思湛了終無見想念不可脫云何獲圓通雜亂起思則於湛了之性終無所見如前精了不能徹也識見雜三和詰本稱非相自體先無定云何獲圓通眼見以眼根對境而後起識故云雜三和若窮其本則本無自體故曰非相既無自體不自獲圓通心聞洞十方生於大因力初心不能入云何獲圓通普賢菩薩能知河界外事此由修法界行大因所生非初心能入也初心既不能入焉能獲圓通乎鼻想本權機只令攝心住住成心所住云何獲圓通孫陀散亂故佛令觀鼻端此亦權教耳蓋真心無住有住則妄故曰住則成所住說法耳音聞開悟先成者名句非無漏云何獲圓通夙根之人一聞千悟聲入心通故開悟者必先成之人初心則不能入也況名句多有挂漏焉能獲圓通乎持犯但束身非身無所束元非徧一切云何獲圓通波離持犯但束一身而已不該不徧焉獲圓通神通本夙因何關法分別念緣非離物云何獲圓通目連神通緣會如意本乎夙因非關意識法分別即意識也而且有緣有念不離於念故非圓通若以地性觀堅礙非通達有為非聖性云何獲圓通以下揀七大若以水性觀想念非真實如如非覺觀云何獲圓通持地平填當涉有為非實聖性月光水觀未離念想難契如如蓋如如之理非覺觀之法也若以火性觀厭有非真離非真心方便云何獲圓通烏芻聞說欲火而生厭離是厭有也有厭而離豈真離乎初心起厭非方便法也若以風性觀動寂非無對對非無上覺云何獲圓通琉璃光觀風性動則與寂對有對非真覺也若以空性觀昏鈍先非覺無覺異菩提云何獲圓通晦昧為空故云昏鈍彌勒修惟識觀而所觀之識念念生滅存心觀之已妄況獲圓通耶若以識性觀至因果今殊感云何獲圓通勢至修念佛行而念性即生滅法依生滅因求常住果是殊感也星按文殊所揀是言初心難入若二十五菩薩各舉所得所謂聖性無不通順逆皆方便也何得揀擇我今白世尊至欲取三摩提實以聞中入此選耳根堪忍眾生迷本循聲昏惑障重必須聞熏聞修以消塵除障然後可入然以聞為入特得其一而已必期於遺聞反聞然後為至也離苦得解脫至救世悉安寧出世獲常住於沙劫入塵國歎三十二應也得自在施無畏歎四不思議十四無畏也說法不滯為妙音尋聲救苦為觀音音性無著為梵音應不失時為潮音我今啟如來至十處一時聞此則圓真實分圓通二字以顯真實之理耳根之妙設有一處不聞不得為圓目非觀障外至五根所不齊是則通真實一為所隔不得為通音聲性動靜至生滅二因離是則常真實動靜有無皆屬聲塵耳根圓離不隨生滅是則常性之真也縱令在夢想不為不思無覺觀出思惟身心不能及此正顯常真實也五根皆待意思有無不常惟耳在夢能聞杵聲是不為不思而無也其為覺觀出乎思惟之表絕勝餘根矣故曰身心不能及今此娑婆國至豈非隨所淪旋流獲無妄宣明者明己之本聞自性也眾生迷己之本聞乃循聲而流轉如阿難落邪豈非循聲色而流轉乎雖多聞強記何益之有若能旋流返聞始獲自性而無輪轉之妄矣阿難汝諦聽至將聞持佛佛何不自聞聞末句謂將汝循聲之妄聞以持諸佛之言教何不反聞自性以求解脫乎溫陵謂佛佛乃佛之佛性不作佛語者義長聞非自然生至一根既返流六根成解脫上既警其自聞今乃略示修相先指妄聞非無緣生生必藉因因即聲教也當以三慧旋此根境俱令脫粘所拈既脫則能脫之慧復何名狀但得一根返流則六根皆解脫矣見聞如幻翳三界若空華聞復翳根除塵消覺圓淨見聞句通指妄根也三界句通指妄境也以皆妄故聞復則翳除塵消而覺淨所以一返源而六解脫也淨極光通達至摩登伽在夢誰能留汝形淨極二句根解脫也却來句境解脫也然則摩登正在夢境誰能留汝使不解脫哉如世巧幻師至息機歸寂然諸幻成無性幻師妄性也一機妄識也性由識動故息機歸寂則諸幻無性而各各解脫矣六根亦如是至餘塵尚諸學明極即如來一精明識精也六根因之與塵和合幻作諸妄故一處休復六處皆不成而想塵垢識應念消亡得妙圓通矣細惑未盡曰餘塵分證未滿曰諸學惑淨用極即如來大眾及阿難至性成無上道圓通實如是能旋倒妄反聞自性必資此性性成無上菩提性成所謂性一切心也此是微塵佛至我亦從中證非惟觀世音涅槃門超生死證真常之要道也三界果人莫不由此故未來學人當依此法誠如佛世尊至非是長修學淺深同說法成就不生不滅涅槃妙心惟耳根為最餘則佛之威神加被今即己事而舍塵勞非始終長修淺深同說之法也欲其長修同說無如觀音法門矣如那律失明而旋見畢陵觸刺而遺身烏芻厭欲而登覺持地待佛而消塵皆己事而已豈因己之一事便獲圓通乎明知其為威神加被也頂禮如來藏無漏不思議至三藐三菩提心決定清淨明誨第二十三阿難心迹圓明悲喜交集欲以是法應世度生而恐末劫邪師妄說佛法受其眩惑易退覺心難入正定欲攝其心入三摩地云何安立道場遠諸魔事阿難整衣服於大眾中至不如此說即波旬說小乘權教有五淨肉謂不見不聞不疑自死烏殘名五神力所化於中又除人駝象馬驢狗獅子狐猪獼猴十種身謂之血肉身分謂喪毳之類二塗謂身不服食心不貪求阿難又復世界六道眾生至不如此說即波旬說多羅貝多樹也刀斷則不復生
