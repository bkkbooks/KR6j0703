body:
  text: 淮海參佛弟子蘊空居士陵西星述旨廣陵後學龔延庚校定攝持軌則第二十四承前卷阿難問攝持軌則前示內攝此示外攝阿難汝問攝心我今先説至張於門側左右安置當陽正位寂場真主也彌勒當來真主也觀音上同下合真主也金剛降魔斷障真主也帝釋梵王有力外護也烏芻火頭金剛藍地青面金剛軍茶利金剛之異名毗俱胝三目持鬟髻者頻那夜迦豬頭象鼻三使者又取八鏡覆懸虗空至身心明淨猶如琉璃毗奈耶即毗尼願也阿難若此比丘本受戒師至汝問道場建立如是以上壇儀多言表法表者備物以見意如執雉執騖下茶奠鴈之類必先具是物非空言也溫陵之解亦佳云所宗者華嚴大論的非郢説今不復贅阿難頂禮佛足而白佛言至放光如來宣説神呪南無薩怛他蘇伽多耶至娑婆訶二十七是名白傘蓋悉怛多六字乃呪心也溫陵謂此呪四百十八已前但是皈依三寶及敘呪功力求願加被之事至跢姪他以後九句乃祕密心呪前云一時常行一百八遍者此而已矣此諸佛密語神智妙用總無量義持無量法摧邪立正殄惡生善故曰陀囉尼此云總持時師傳誦多有訛謬少俟嚴加訂正今具已後九句摩訶悉怛多般怛囉跢姪至虎𤙖都嚧甕泮娑婆訶跢姪他華即説呪曰阿難是佛頂光聚悉怛多至悉皆滅除更無毫髮四棄即前四重犯尼加觸八覆隨為八阿難若有衆生至一切災厄悉皆消滅支提云可供養處即淨剎之通稱脫闍此云幢阿難在在處處國土衆生至恆令此人所作如願修證三摩第二十五阿難即從座起頂禮佛足至佇佛慈音瞪瞢瞻仰聖位極果曰涅槃初因曰乾慧入信住行向及四加行曰四十四心見華嚴經即信解行住目曰修行復進十地名入地中是名初證及到涅槃名為妙覺乃極證也爾時世尊讚阿難言至及大涅槃二轉依號妙性之中本來圓離由迷妄相因故有修有證於是轉大覺而名菩提轉生死而依涅槃名二依號生滅名妄故下有十二種顛倒之因滅妄名真故下有修行漸次諸位阿難汝今欲修真三摩地至建立世界及諸衆生性明心真如妙體也即前所謂妙性圓明者至於明圓則因明發性而生妄見由是從畢竟無相之真成究竟有相之妄然此有之所有皆非因之所因何者妙性圓明離諸名相本來無有住所住相本此無住之中熾然建立世界得非妄乎迷本圓明是生虗妄至由是故有衆生顛倒修行之人直下圓觀真性將欲旋復希冀之心已非真真如性矣何者舉心即非動念即乖況非真以求復乎非真求復宛成非相心而非心法而非法生而非生住而非住於諸有中宛轉發生生力發明重以成業同業相感相滅相生因於殺盜淫三者淫欲故相生殺盜故相滅以此業果相續故有衆生顛倒阿難如何名為世界顛倒至變化衆生成十二類是有所有即前之此有所有也既有所有則自然而成分段有分段故有方位有方位故有界限由是而界立焉界立則非因而成所因無住而成所住是以遷流不常過去者不留現在者尚存未來者相續因此而成三世三世四方和合相涉涉乎其間者悉從其變此世界顛倒之由也是故世界因動有聲至窮十二變為一旋復雷行雨施品物流行故動則有聲有色香因色有觸舌為味意根之法由是以生六亂妄想以成業性三世四方和合相涉十二區分由此輪轉窮十二變蓋自無明緣行行緣識以至老死終而復始故曰窮十二變為一旋復乘此輪轉顛倒相故至若非有想若非無想此十二類輪轉顛倒下為別明一卵生由因世界虗妄輪回動顛倒故和合氣成至魚鳥龜蛇其類充塞羯羅藍此云凝滑胎卵未分之相卵惟想生若龜鱉之類則其想益明想體輕舉想多升沉故曰飛沉亂想名動顛倒卵以氣交故曰和合氣成陰符云禽之制在氣二胎生由因世界雜染輪回欲顛倒故和合滋成至人畜龍仙其類充塞遏蒲曇此云胞卵胎漸分之相也胎因情有雜染即情也情生於愛名欲顛倒胎以精交名和合滋成情有偏正名橫竪亂想橫則龍畜竪指人仙仙以胎成乃身外之身三濕生由因世界執著輪回趣顛倒故和合暖成至含蠢蠕動其類充塞蔽尸此云軟肉濕生之初相也濕以合感執著即合也合以愛滯觸境趨附名趣顛倒濕以陽生名和合暖成所趣無定名翻復亂想故感蠢蠕之類十生皆本於淫欲而起於情想以迷情愈妄故化理愈乖以至蕩為空散頑為木石妄末雖殊妄本則一四化生由因世界變易輪回假顛倒故和合觸成至轉蛻飛行其類充塞羯南名硬肉蛻即成體無軟相也化以離應變易即離也離謂離此托彼名假顛倒觸謂觸類而變故名和合觸成轉故趣新名為新故亂想蛻謂蛻故趨新也如蟲為蝶為蛤丸以不同形而相禪皆轉蛻也自此以下皆稱羯南乃諸類之通稱釋子界澄疏卵以想緣合業妄動名動顛倒飛沉唯氣即動業之力也故感卵為緣生為魚鳥胎因情有雜染欲情也以滋液生有橫有竪故緣胎而成人畜濕惟緣合執著趣赴所赴無定故合濕為緣生為蠢蠕化以虗假不待於緣由業力強故變易轉蛻此四生者以業緣俱勝相合為類而分四種疏以滋作蔓解今易之五有色由因世界留礙輪回至休咎精明其類充塞真性融湛本無留礙亦非光耀由迷滯故成留礙輪回障失融湛妄合明著粘湛發光以成精耀此一切精靈神物有所依憑而勒顯道者皆其類也六無色由因世界銷散輪回至空散銷沉其類充塞厭有著空滅身歸無名銷散輪回迷漏無聞名惑顛倒厭有歸無則依晦昧為空故和合暗成而名陰隱亂想此有想無色而不無業體故亦稱羯南體合空昧識附陰隱故稱空散銷沉如鬼尸附體之類倐有倐無七有想由因世界罔象輪回至神鬼精靈其類充塞資中云或如外道凡夫祠禱神明托附影像終身奉事志慕靈通因果相酬故生其類豫謂憶成謂思憶人間血食故托附影像以求供養八無想由因世界愚鈍輪回至土木金石其類充塞不了諦理愚鈍之極則癡頑無知精神化為土木金石無復情想如華表生精黃頭化石又如望夫化石長弘之血為碧或其類乎釋子界澄疏有色者由緣偏勝從果立生精耀流礙得即業果之色也故有休咎吉凶之殊無色者銷散陰隱以業力強不待緣故有想者惟業所生故罔象虗無由想結沉凝不待緣合而精明為鬼無想者以情業弱故愚鈍癡頑此但緣故為金石草木此四生者以業緣偏勝相離為類故分為四種九非有色由因世界相待輪回至以蝦為目其類充塞水母以水沫為體以蝦為目本非有色待物成色不能自用待物成用迷失天真綿著浮偽彼此異質染緣相合故曰因依雖有色而實非有色也十非無色由因世界相引輪回至呪詛厭生其類充塞邪業相引使性情顛倒而乘呪托識不由生理妄隱呼召即世間邪術呪詛精魅厭物因而生有者十一非有想由因世界合妄輪回至異質相成其類充塞二妄相合性情罔昧異質相成生理回互如彼蒲盧本為桑蟲非有餘想而成蜂想十二非無想由因世界怨害輪回至皆遭其食其類充塞怨害相酬傷殺相反生理怪誕棄絶倫義故感梟鏡之類釋子界澄疏非有色成色者以無待有偽為因依彼業力微故必假於緣如水母以蝦為目非無色成色者以有引無呼召成體由緣業俱微故受生時必資於呪詛非有想成想者彼業微故妄取他緣如蒲盧附翼為蜂非無想成想者如梟鏡之類附離他緣非有想以此四生以緣力俱微附離成化故分為四種以上十二類生俱緣業有原薄感果有勝劣故三四十二以是為差惟世尊能窮衆生輕重業性將明流轉之因故示顛倒之性是名衆生十二種類此皆不了妙覺明心迷陷情欲積妄發生隨妄輪轉非正修行不能免脫至第八卷方示除妄修證之法
