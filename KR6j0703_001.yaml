body:
  text: 唐天竺沙門般剌密帝譯烏萇國沙門彌伽釋迦譯語菩薩戒弟子前正議大夫同中書門下平章事清河房融筆受明淮海參佛弟子蘊空居士陸西星述旨明太子太保吏部尚書李戴印可明中憲大夫直𨽻淮安府知府劉大文明中憲大夫直𨽻揚州府知府楊洵校閲淮南後學陳南金校定通釋經題夫如來果體其體本然何假密因菩薩道用其用無作孰資萬行無因無作無修無證無了不了大小名相一切不立此真首楞嚴究竟堅固者也特以衆生如來隱於藏心非密因不顯衆生菩薩淪於七趣非萬行不修覺皇於是示之以大法使不迷於小道而默得乎無外之體喻之以佛頂使不滯於相見而妙極乎無上之致指如來密因使明本妙之心知三世諸佛皆依此為初因明修證了義使悟究竟之法知一切聖人皆依此而證果乃至具足菩薩清淨萬行一切事法無不究竟至於實相堅固不壞故名大佛頂如來密因修證了義諸菩薩萬行首楞嚴經始於徵心辨見終於破陰褫魔無非健相分別事也天如曰梵語首楞嚴乃大定之總名也此翻一切事究竟堅固古師云未修此定一切事法宛爾差殊為法所縛既得此定時山河大地明暗色空一切當處寂滅即是常住心性故云究竟堅固判説經先後刪定舊文夫法王説法有條不紊初説一乘頓教以立本即華嚴也次説三乘漸教以逗機即阿含方等般若也後説一乘圓教以顯實即法華也楞嚴即般若法華之中實大乘終極之教故如來密因菩薩萬行修證之法一切畢竟自此以往無復進修直透一乘圓妙之道故法華會上更無地位之説純談妙法隨根印可授記作佛而已法華之後便説涅槃扶律常談而終焉扶律者所以囑後事談常者所以示真寂此獨臨滅遺付之事非有加於法華也説者不本扶律之意輒判楞嚴於法華之後亦稱扶律談常若然則是扶律之後而又扶律進修之後而又進修前則加於法華後則贅於涅槃倒置駢枝紊於法王之法矣以經證之竛竮之子既領寶藏復何所求化城之人既到寶所復何前進燈明説法華以後中夜涅槃釋迦説法華已便於四衆唱滅復何枝蔓於楞嚴哉如必以楞嚴居後則阿難既於法華諸漏已盡而復於楞嚴未盡諸漏既於法華堪授佛記而復於楞嚴未全道力既先領悟妙法而復不知真際既已安住佛道而復溺於淫舍是皆倒置理自不然故判楞嚴在般若之後者蓋以般若之後慧學方盛定力未全人或溺於多聞失於正受於是示首楞之大定資般若之大慧使定慧均等學行兩全而究竟趨於一乘實相此楞嚴所以説也論三經大致無非為一大事因緣而必先般若以發明次楞嚴而修證終法華而印可然後盡諸佛之能事此其序固如是也然導達禪乘決擇正見無尚楞嚴矣正宗五分此經正宗文五一見道分初由七徵以顯常住真心性淨明體即第一卷次由八還以辨妙淨見精顯如來藏即第二第三卷復即山河萬象宣勝義中真勝義性四卷初至中皆使行人明心見性為修證密因故名見道分二修道分首示初心二決定義令審因心果覺又審煩惱根本為修行真基四中至末決示六根舒結倫次令解結心而得妙圓通為修行真要五至六中此利根進修之一終也故阿離至此明了菩提所歸道路自謂已悟成佛法門而願度末世復請安立道場攝心軌則遂聞三無漏學四種律儀及大神呪六中至末總為修行方便故名修道分三證果分始從凡夫終大涅槃歷示增進五十五位至盡妙覺成無上道故名證果分四結經分列示五門結顯大旨八中五助道分初明天獄七趣一惟心造次明奢摩他中微細魔事恐諸行人洗心非正失錯墮落故名助道八中十末夫見道然後修道修道然後證果修證事畢於是結經楞嚴止此而已而世尊大慈復欲持戒衆生謹潔無犯真修行者不遭岐枝故説助道之法最後垂範遂入流通而終會焉此乃一經綸貫連環不斷其大略如此大佛頂如來密因修證了義諸菩薩萬行首楞嚴經正文如是我聞一時佛在至文殊師利而為上首通敘祗園結集之會舍利弗智慧第一目犍連神通第一拘絺羅博學第一富樓那説法第一須菩提解空第一優波尼了悟色空第一時波斯匿王為其父王至及摩登伽歸來佛所通敘阿難誤墮淫室之由波斯匿舍衛國王也剎地利王族也旃陀羅屠膾淫酒之家阿難見佛頂禮悲泣恨無始來一向多聞未全道力殷勤啓請十方如來得成菩提妙奢摩他三摩禪那最初方便於時復有恆沙菩薩及諸十方大阿羅漢辟支佛等俱願樂聞退坐默然承受聖旨佛告阿難汝我同氣情均天倫當初發心於我法中見何勝相頓捨世間深重恩愛阿難白佛我見如來三十二相勝妙殊絶形體映徹猶如琉璃常自思惟此相非是欲愛所生何以故欲氣粗濁腥臊交遘膿血雜亂不能發生勝淨妙明紫金光聚是以渴仰從佛剃落佛言善哉阿難汝等當知一切衆生從無始來生死相續皆由不知常住真心性淨明體用諸妄想此想不真故有輪轉汝今欲研無上菩提真發明性應當直心酬我所問十方如來同一道故出離生死皆以直心心言直故如是乃至終始地位中間永無諸委曲相阿難我今問汝當汝發心緣於如來三十二相將何所見誰為愛樂阿難白佛言世尊如是愛樂用我心目觀見如來勝相心生愛樂故我發心願捨生死佛告阿難如汝所證真所愛樂因於心目若不識知心目所在則不能得降伏塵勞譬如國王為賊所侵發兵討除是兵要當知賊所在使汝流轉心目為咎吾今問汝唯心與目今何所在徵心品第一阿難被摩登伽女以先天梵呪攝入淫室將毀戒體將者且然未必之辭阿難道力少見於此但未全耳佛為宣呪提歸深悔道力未全啓請如來妙奢摩他三摩禪那最初方便妙奢摩他止也三摩觀也禪那靜慮也於是世尊為之決擇真妄以為密因先問阿難言汝何所見割愛出家阿難言見如來三十二相勝妙殊絶是以渴仰從佛剃落是知阿難見相乃緣塵分別之見其所發心即妄想攀緣之心一切衆生從無始來生死相續皆由不知常住真心性淨明體用諸妄想此想不真故有輪轉欲研無上菩提正當辨其真妄而起妄之源由於心目如來首問阿難得其見相愛樂之源問汝心目今何所在以下七徵八辨皆顯妄心妄見本無定體由攀緣起是謂無始生死根本須令破斷然後可入止觀正定一徵答言識心在內阿難白佛言世尊至住在身內無有是處阿難言識心在內眼根居外佛言汝身坐講堂先見如來後矚園林若使心在身中自合先見臟腑今不能然是謂不見如來見堂外也覺了能知之心云住身內者無有是處二徵又疑識心在外阿難稽首而白佛言至住在身外無有是處阿難又言悟知我心實居身外譬如燈光居在室外不能照室佛言心若居外則身與心自不相知如彼之食不能得此之飽今眼見我手心即分別是眼根心識又似相知云何在外是故覺了能知之心住在身外無有是處三徵又疑識心潛伏根中阿難白佛言世尊至如琉璃合者無有是處阿難又悟如佛所言心不見內則心不在內明矣身心相知則心不在外明矣如我思惟了知此心潛伏根裏譬如琉璃籠眼雖有物合而不留礙彼眼隨見是知覺了能知之心不能見內為在根故分明矚外為潛根故佛言汝謂心潛根內如琉璃合者方其籠眼之時見琉璃不阿難答言實見琉璃佛言心潛根內既能外見琉璃何以不能見眼若能見眼眼則同境不得成隨若不能見則汝言潛伏根內者無有是處四徵又計見暗名在身內阿難白佛言世尊至名見內者無有是處阿難又作如是思惟衆生臟腑居中竅穴居外有藏故暗有竅則明又計我心在內故開眼見明閉眼見暗佛言汝當閉眼見暗之時此暗境界為與眼對不與眼對名與眼對者暗在眼前云何成內若不對者云何成見若合眼見暗名在身中開眼見明何不見面若能見面則此了知之心乃在虗空何成在內若在虗空則如我見爾面見爾面者豈爾身乎汝必執言身眼兩覺則是一人應有一知而汝一身當成兩佛矣是故汝言見暗名在內者無有是處五徵又計隨所合處心則隨有阿難言我常聞佛開示四衆至心則隨有無有是處阿難又自思惟我今如是思惟豈隨境思惟者即我心體耶故隨所合處心則隨有不在內外不在中間夫以思惟為體者特浮想耳非實體也佛言由法生故種種心生隨所合處心則隨有是汝謂心無體也心若無體云何能合若為有體云何隨合若無體而能合者則如波旬所説十九界因七塵合是義不然明矣十九界七塵五諦六蘊乃魔説之以惑首羅長者見涅槃經十九界七塵界在何處塵在何處可以無體而能合乎故曰是義不然若為有體則汝試自挃其身汝所知心為復內出為從外入若復內出當見身中若後外入何不見面既不見汝身中又不能見汝面心體何在阿難言見身見面自是眼見以心知為見非其義矣佛言眼若能見則諸已死之人尚有眼在應當見物若能見物云何名死汝謂見是眼見是義不然且汝覺了能知之心認為有體試問此體為一體耶為多體耶在汝身中為遍體耶不遍體耶若一體者手挃一支四支應覺若多體者則稱多人何體為汝在汝身中若遍體者當同前挃挃其一處處處咸覺若不遍體設汝以頭足並觸頭有覺者足應無知今汝不然又非不遍是故汝言隨合隨有者無有是處何者不合則無成於斷滅常住真心當不如是夫以真心妙覺常靜常應觸處洞然非內非外非一非多非遍不遍認以思惟則去之愈遠阿難蓋不知也六徵又計心在根境中間阿難白佛言世尊我亦聞佛至當在中間無有是處阿難又自思惟此心內無所知不成在內身心相知不成在外今既相知矣却又無見是知此心不在內外與根當在中間佛言所謂中者為在身中為在境中若在身中即同在內若在境中必須立表一有所表東看成西南觀成北表體無定心則雜亂阿難言我所謂中非指身處之中乃根塵之中也如世尊言眼色為緣生於眼識眼有分別色塵無知識生塵中即為心在佛言此心若在根塵之中則此心體為復兼二為不兼二兼二則不得稱中何者物體雜亂物非體知也物者根塵體者心體根塵無知心體有知物與心體成敵兩立以何為中不兼亦不得稱中何者不兼根則獨有根在根非知也不兼境則獨有心在心非不知也非知不知則無體性中為何相是故當知在中之説無有是處七徵又計無著名之為心阿難白佛言世尊我昔見佛至名覺知心無有是處阿難又舉佛常言覺知分別心性不在內外中間俱無所在一切無著我將無著名為心不佛言凡所有相名為一切汝不著者是謂物為有耶為無耶無則同於龜毛兔角云何可著而名不著若是其非無非無即相有相即有所在云何不著是故以一切無著名知覺心者無有是處夫虗妄浮心緣慮而有本無定體亦無定所以上七番破其妄所意在顯真其如阿難未悟故下重請開示孤山曰總此七番似破四性在內潛根見內似自性在外似他性中間似共性隨合無著似無因性龍樹云諸法不自生亦不從他生不共不無因是故説無生是故如來七番逐破使介爾妄心無逃避處妄賊既除真王得顯無生之理於茲見矣此言外意也辨見品第二陰符經云心生於物死於物機在目是知心之所以有生者目為之牖也迷中倍人轉見於物遂爾迷真以故世尊急為提點使知吾人見性原自不迷乃吾常住不還之主人而彼前塵分別影事去則不留不可認以為真故嘗喻之見如鏡體物如影事物去而鏡體常明未見有變滅者爾時阿難在大衆中至失汝元常故受輪轉阿難因前徵發乃知迷妄於是哀請求詣真際願示奢摩正路佛言一切衆生無始以來種種顛倒業種自然與諸行人不成正果皆由不知二種根本錯亂修習云何二種一者無始生死根本則汝今者用攀緣心為自性者是二者無始菩提涅槃元清淨體則汝今者識精元明能生諸緣所遺失者是何謂緣所遺者是緣生則虗妄想像顛倒影事如人徒見鏡影而忘鏡體故真性遺失今當與汝決擇因舉臂屈指為光明拳問阿難見不阿難言我見世尊舉光明拳耀我心目佛言汝將誰見阿難答言我將眼見佛言汝以眼見以何為心當我拳耀阿難言如來現今徵心所在而我以心推窮尋逐即能推者我將為心佛言咄哉阿難此非汝心阿難矍然自失白佛言此非我心當名何等佛言此是前塵虗妄想相惑汝真性至於今生認賊為子失汝元常故受輪轉此一提醒已後節節緊湊更宜熟玩阿難白佛言世尊至合掌清心佇佛悲誨世尊欲令阿難及一切衆生獲妙明心得清淨眼故上與徵心此復辨見承上光明拳耀心目設為譬喻而問阿難若無我手不成我拳若無汝眼不成汝見是義均不此義本不均而阿難曰均佛謂是義不然何以故若無手人拳畢竟滅而無眼人見未嘗滅也今舉盲人而問必言我今眼前性見黑暗以是義觀前塵自暗見何虧損使無眼之忽得眼光睹見前塵作種種色是名眼見何異黑暗之人忽得燈光見種種色還是眼見抑是燈見當知燈能顯色能見色者是眼非燈以譬眼能見色如是見者是心非眼知見不由眼而直在心則真悟見性直超形纍而可以得清淨法眼矣而阿難猶未開悟爾時世尊舒兜羅綿至誰為搖動佛言如是佛告大衆我初於塵野苑中為阿若多五比丘等及四衆言一切衆生不成菩提及阿羅漢皆由客塵煩惱所誤汝等因何開悟得成聖果憍陳如起白佛言我於大衆得獨解名因悟客塵二字得成斯果何謂客塵譬如行客食宿旅亭事畢束裝前途不遑安處若實主人自無攸往我將以是不住者名為客義住者名為主義又如清暘升天光入隙中見有塵相塵質搖動虗空寂然我將以是澄寂者名為空義若搖動者名為塵義佛言如是如是客喻分別之粗塵喻俱生之細然而旅亭之客遣之則易幽隙之塵拂之實難所以俱生煩惱必須五陰盡者方得蕩絶詳在十卷即時如來屈五輪指屈已復開開已又屈問阿難言汝今何見阿難言我見如來手掌衆中開屈佛言還是我手開合抑是汝見開合阿難言是如來手非我見故佛言如是如是初問開合以明搖動之塵次問動靜以明不住之客是知動搖開合皆在境而不在心亦明甚矣於是世尊舉掌飛光耀彼阿難阿難左右顧盻頭動不止佛言是汝頭動為汝見動阿難言我頭自動而我見性尚無有止誰為動搖佛言如是如是於是如來普告大衆至輪回是中自取輪轉若復衆生以動搖者名之為塵不住者名之為客亦已認明當下討箇分曉汝觀阿難頭目動搖見自無動及觀我手拳自開合見無卷舒則彼無動搖無卷舒者是名何物獨非汝之真性乎云何衆生以動為身而不知不動者之非身以動為境而不知見境者之非見認物為己遺失真性輪回是中自取輪轉不亦宜乎蓋責其認客塵而遺自性也溫陵曰心境萬法皆有本寂之體自本之外皆為客塵如手之開合頭之動搖及其止也本體自寂他無所有則諸凡妄動本不可得而汝衆生以動為身以動為境是徒認客塵而遺真性顛倒行事輪回流轉實兆於此曰是中自取真性之中本無流轉咸自取爾欲其即迷處而悟也
