body:
  text: 淮海參佛弟子蘊空居士陸西星述旨淮南後學蔣一麒校定深窮萬法第九爾時富樓那彌羅尼子至我常聞佛宣説斯義爾時富樓那彌多羅尼子白佛言世尊我今聞如來妙義微妙法音雖則宣明令我除惑今猶未詳斯義究竟無疑惑地世尊若復世間一切根塵陰處界等皆如來藏清淨本然云何忽生山河大地諸有為相次第遷流終而復始謂清淨則宜無諸相謂本然則宜無遷流矣此第一疑問也又如來説地水火風本性圓融周遍法界湛然常住若地性遍云何容水水性遍則不生火水火二性俱遍虗空得無相淩相滅乎地性障礙空性虗通云何二俱周遍而我不知是義攸往此第二疑問也皆躡前四科七大之文而起意以性相相違事理相礙常情疑滯故求決通佛答第一問中清淨本然云何忽生山河大地汝常不聞如來宣説性覺妙明本覺明妙乎性覺妙明本覺明妙萬法體用之異稱也能性一切曰性覺性覺之妙顯乎明即自覺而出見於萬法者也性之所本曰本覺本覺之明藏乎妙即自用而返冥於一真者也了斯二義則體用一覺物我一妙無復諸相之異矣又孤山曰本覺亦性覺也變其文耳以本元自性既能所雙絶寂照互融故作兩句説耳天如曰此蓋佛欲顯山河大地由妄覺生故且標真覺體用互顯而初無能所者以立本也下文乃舉真妄二覺佛言汝稱覺明為復性明稱明為覺為覺不明稱為明覺富樓那言若此不明名為覺者則無所明佛言若無所明則無明覺有所非覺無所非明無明又非覺湛明性性覺必明妄為明覺覺非所明因明立所所既妄立生汝妄能無同異中熾然成異異彼所異因異立同同異發明因此復立無同無異如是擾亂相待生勞勞久發塵自相渾濁由是引起塵勞煩惱佛言汝稱覺明為復性明者稱之為覺耶為覺而不明者稱為明覺耶促舉覺明二字審其所解富那答言若此不明稱之為覺者則無所明矣安得為覺耶不知才有所明即墮妄覺此富那所解之非也佛言若無所明則無明覺矣豈不幸哉蓋明覺之妄自所明起故有所明者是明也非覺也無所明者是覺也非明也而無所明非無明也若無明又非覺湛明性矣何者性覺者必明所明則妄為明覺者耳妄即所明也故吳興曰本性之覺必具湛明之性以不了故妄為能明之明所覺之覺耳溫陵以強生了知為必明既言能明所明又立必明終不若吳興之似妥也故覺非所明乃本然之真體因明立所則當人之妄識所既妄立生汝妄能能所既立心境互分無同異中熾然成異夫異者彼所異耳本覺之體未必異也反異為同同異對立互相發明宛轉遷移因此復立無同無異不知真體之中本無是事皆由能所對待妄立擾發塵情遂使妙明斯渾妙湛斯濁晦昧空色自此兆矣由是引起塵勞煩惱染污為塵擾動為勞憂煎為煩迷亂為惱天如曰此章問答良有以焉前佛舉七大以該萬法則世界虗空衆生業果在其中矣惟其談七大之相則曰如來藏中循業發現談七大之性則曰周遍圓融本如來藏富那至此未達循發遍融之義因此二疑而生二問初問清淨本然云何忽生山河大地諸有為相清淨本然即如來藏性也山河大地即世界及虗空也及有為相即衆生業果也以其未達循發之義故曰云何忽生此四字緊要問也如來遂舉性覺之中妄為明覺者諭之而斷之曰因明立所此四字為緊要答也蓋明即妄明妄明則無明也所即山河大地諸有為相發現之由也要而言之因明立所者即是因無明而生起世界虗空衆生業果也然則循業發現之疑云何忽生之問一答俱銷不勞餘説矣今復逐節明之因明立所所既妄立生汝妄能此一節即指無明也無同異中熾然成異至此復立無同無異此一節問因上無明而成世界虗空及衆生也如是擾亂相待成勞勞久發塵自相渾濁上二句重指無明立所等下二句重指熾然成異等塵即世界衆生由世界衆生而有業果故云由是引起塵勞煩惱此一節躡括前義而且隱然示三種之情狀也起為世界至真有為法乃牒合上文同異等義而顯示三種之名相矣然此猶是總顯自覺明空昧以後始別開三節詳序三種之相續詳序既終復云如是三種顛倒相續皆是覺明了明知性因了發相從妄見生山河大地諸有為相次第遷流因此虗妄終而復始此又總結一章答意三種相續第十三種謂世界衆生業果自起為世界至終而復始是言感結之由皆覺明明了知性因了發相從妄見生起為世界靜成虗空至以是因緣世界相續富樓那未達如來藏中循業發現之旨故有云何忽生之問佛為敘其感結之由皆因明覺之妄起為世界靜成虗空言妄覺動則勞擾發塵而起為世界矣妄覺伏則頑然溟漠故靜成虗空矣虗空為同世界為異如來藏中清淨自然本無同異其熾然成異者真有為法也且以世界起立之始言之蓋世界起始起於覺明而依乎風金水火以生萬物此在儒書中即陰陽五行化生萬物之意覺明空昧相待成搖故有風輪執持世界覺明陽也空昧陰也陰陽對待一變一合而成搖動搖動生風故有風輪旋於九地之下彼世界者依風輪住故曰執持龍眉子金丹印證詩云溟滓無光太極先風輪擊動産真鉛空昧即溟涬無光之義風輪擊動則陽之動也産真鉛則陽之萠也金之母也陽動無常無常屬妄陰靜常住常住為真此在造化上論溫陵解云明昧相搖不覺心動造化亦有心耶不知彼抂人性上論蓋山河大地抂人性上固自有之今且依造化作解逐節體貼向人性上去因空生搖堅明立礙彼金寶者明覺立堅故有金輪保持國土因空生搖搖而不已強陽之氣凝而至堅堅明立礙其性堅剛彼金寶者即人性中明覺所立之堅也故大地之下復有金輪保持國土堅覺成寶搖明生風風金相摩故有火光則人性中變化倐忽閃鑠不停者也寶明生潤火光上蒸蒸而生水故有水輪包含大地故曰含十方界水即人性中之愛水也火騰水降與金之立堅者交發濕為巨海乾為洲灘以是義故大海之中火光常起洲灘之中江河常注水勢劣弱於火火不受尅結而成土化為高山以是義故山石擊則出火融則成水土勢劣弱於水水不受尅水氣上升柚為草木以故林藪遇燒成土因絞成水造化之中初以陽動交變妄合而成五行𮞏相為種生出不窮以是因緣世界相續人性之中明覺妄動起引塵勞亦復如是復次富樓那明妄非他至以是因緣衆生相續又以衆生之起始言之如上之搖明堅明皆明妄也豈離本覺別有他故皆本覺之明為之咎耳蓋不惡於覺而惡於明若覺而不明則無所明之妄矣所妄既立故覺明之體遂有方所隔礙不能圓融周遍而明理不踰以故六根妄局聽不出聲明不超色色香味觸六妄分開各守本根不成圓通所謂明理不踰義蓋如此六塵妄染六識妄分由茲業性遂起妄業同業相纏合離成化六道四生皆由是起同業即胎卵之類由父母己三者業同故相纏而有生合離即濕化之類或合濕而成形蠢蠕是也或離異而托化天獄鬼等是也何謂見明色發見明即所明也既有妄明則由心生境顯發妄色故曰見明色發因明起見則見境生情故因見生想見異則情違故異見成憎想同則心順故同想成愛三愛交住曰流三想相投曰納愛為輪回根本故流愛為種想為傳命之媒故納想成胎藉交遘而發生由同業而吸引受生托質始於此也故有因緣生羯羅藍遏蒲曇等羯羅藍此云凝滑胎中七日之相也遏蒲曇此云皰胞中二七之相也胎卵濕化四生之類隨其所應卵惟想生胎因情有濕以合感化以離應更相變易所有受業逐其飛沉以是因緣衆生相續亂思曰想結愛曰情氣附曰合合濕而生也形遁曰離離此生彼也更想變易者或情變為想合相為離無定業也卵易為胎濕易為化無定質也隨業受報或升或沉無定趣也此衆生相續之由也富樓那想愛同結愛不能離至因此虗妄終而復始以業果起始言之想愛同結愛不能離則諸世間父母子孫相生不斷是等則以欲貪為本此言緣愛起欲也貪愛同滋貪不能止則諸世間卵化濕胎隨力強弱遞相吞食是等則以殺貪為本此言緣貪起殺也以人食羊羊死為人人死為羊互相噉食惡業俱生窮未來際是等則以盜貪為本緣殺起盜也何謂盜貪不與而取謂之盜貪汝負我命我還汝債以是因緣經百千劫常在生死此殺盜相續之由也汝愛我心我憐汝色以是因緣經百千劫常在纏縛此欲貪相續之由也惟殺盜淫三為根本以是因緣業果相續如是三種顛倒相續皆是覺明明了知性因了發相從妄見生山河大地諸有為相次第遷流因此虗妄終而復始牒前結答世界衆生業果皆覺明之咎然非歸咎覺明也覺而明斯為咎耳富樓那言若此妙覺至菩提涅槃亦復如是富樓那因佛前言覺明之咎復有此疑言此本妙覺明衆生之心與如來妙覺本無增減無狀忽生山河大地諸有為相如來既證空覺何時復生諸有佛為設譬如彼迷人於一聚落惑南為北此迷為復因迷而有因悟所生富那言此迷本無根云何因迷悟非生迷云何因悟佛言如彼迷人正在迷時倐有悟人指示令悟是人既悟更生迷不不也世尊佛言十方如來亦復如是此迷無本性畢竟空昔本無迷似有迷覺覺迷之迷既滅本覺更不生迷亦如翳人見空中華翳病若除華於空滅既了所譬何復前疑又如金礦雜於精金其金一純更不成雜又如木成灰燼不重為木諸佛如來菩提涅槃亦復如是以上牒答云何忽生山河大地諸有為相之問此下復答四大各遍云何相容之問富樓那又汝問言地水火風至愛念小乘得少為足富樓那又汝問言地水火風本性圓融俱遍法界疑水火性不相淩滅又徵虗空及諸大地俱遍法界不合相容取譬而喻如彼虗空體非羣相而不拒彼諸相發揮何以故彼太虗空日照則明雲屯則暗風搖則動霽澄則清氣凝則濁土積成霾水澄成映此諸相者因彼所生乎抑空中自有乎若明因日生則日照之時十方虗空皆成日色云何虗空復見圓日若明為空中自有則空當自照云何中宵雲霧之時不生光曜當知是明非日非空不異空日觀相原妄無可指陳云何詰其相淩相滅觀性原真惟妙覺明妙覺明心先非水火云何復問不相容者且夫真覺妙明隨緣所現故汝以空明則有空現地水火風各各發明則各各現若俱發明則復俱現俱謂一時各各則有先後云何俱現譬如一水之中現於日影兩人同觀水中之日東行則東西行則西各有一日隨人而去不應難言此是一日云何各行各日既雙云何現一宛轉虗妄無可憑據真覺如日隨緣則如日隨人行七大之相隨緣成異義蓋如此汝以色空相傾相奪於如來藏中而如來藏隨為色空等周遍法界是故於中風動空澄日明雲暗圓融之妙有如此者衆生迷失妙明分別緣影背塵合覺故發塵勞有世間相局促隔礙無怪其有違拒之疑我以妙明合如來藏而如來藏中惟妙覺明圓照法界是故於中一為無量無量為一小中現大大中現小一多互應大小相容現寶剎於毫端轉法輪於塵裏事事無礙法法如如是故現相元妄無可指陳妙性元真無不容納但滅妄塵自合妙覺然而真如妙覺本妙圓心中無一物亦復無有少法可得非空非心非地非水非風非火而所謂七大五陰皆非也非眼非耳非鼻舌身意非色非聲非香味觸法非眼識乃至非意識界而所謂十八界與十八處皆非也非明無明乃至非明無明盡非老非死乃至非老死盡而緣覺觀十二緣法皆非也非苦非集非滅非道非智非得而聲聞之四諦法皆非也非檀那布施非尸羅持戒非毗梨邪忍辱羼音産提精進非禪那禪定非般剌若智慧非波羅蜜多而菩薩之六度法皆非也如是乃至非怛闥阿竭如來非阿羅訶應供三耶三菩正遍知而如來之應供正遍知皆非也非涅槃非常非樂非我非淨而成佛之果世出世法亦非也然而不即不離又以其元明心妙言之即心也是即空也是即地火風水也是即六度也是即根即塵即界即識也是即十二因緣也是即四諦也是即六度也是即如來應供正遍知也是即大涅槃常樂我淨也是蓋如來藏中依體而論則曰本妙圓心依用而論則曰元明心妙是心非法即法即心既非而即即即而非終曰妙明心元又合體用而言故離即離非是即非即妙造乎此則信乎體用雙泯情謂斯斷而藏心妙性廓無瑕玷矣但擬心妄度即乖法體如何世間三有衆生及出世間聲聞緣覺以所知心測度如來無上菩提用世言語入佛知見譬之琴瑟琵琶箜篌雖有妙音若無妙指終不能發汝與衆生亦復如是寶覺真心各各圓滿如琴瑟等各有妙音琴瑟等衆生也妙音藏性也妙指實智也如我按指海印發光汝暫舉心塵勞先起由於不求無上菩提愛念小乘得少為足耳溫陵曰琴音雖具非指不發人心雖圓非師不悟前之多方顯如來藏即佛之按指也身心萬法當處昭然即海印發光也富那等隨語生解疑慮紛紜是塵勞先起也此文大義為釋阿難難云若一切即真我等云何與如來不同妙用今釋云汝等雖有寶覺真心不得妙用以塵勞妄念未清淨故請窮妄因第十一富樓那躡上各各圓滿之言已悟無上益顯妄淪但不知妄之所由故請窮其因富樓那言我與如來至方悟神珠非從外得佛告富樓那汝雖除疑餘惑未盡因引室羅城中演若達多照鏡愛鏡中頭眉目可見而嗔責己頭不見面目以為魑魅無狀狂走照鏡以喻妄心愛鏡中頭取著妄境妄事易著如鏡中眉目實理難知如己頭不見背悟而迷如無狀狂走富那答言此人心迷無故狂走知走之無故則知妄之無因矣佛為明言妄之無因夫妙覺明圓本元明妙本來無妄既稱為妄云何有因若有所因不名為妄自諸妄想展轉相因如是迷因因迷自有實無因也迷既無因妄何所依尚無有生欲何為滅得菩提者如寤時人説夢中事心縱精明欲何因緣取夢中物又況無因本無所有乎彼達多者豈有因緣自怖狂走忽然狂歇頭非外得縱未歇狂頭亦何失是知妄本無因無可滅者但息妄緣則妄息真見矣汝但不隨世間業果衆生三種相續三緣斷故三因不生則汝心中狂性自歇歇即菩提蓋以勝淨明心本周法界不從人得何藉劬勞肯綮修證只為細微妄惑未除妄因既息惑結自除何勞修證譬如有人衣中繫如意珠不自知覺窮露他方乞食馳走忽有智者指示其珠所願從心致大饒富方悟神珠非從外得外道因緣自然疑辨品第十二即時阿難在大衆中至三緣斷故即菩提心爾時阿難白佛世尊現説三緣斷故三因不生心中達多狂性自歇歇即菩提不從外得斯則緣斷而因不生此正因緣之説云何如來頓棄因緣我等及此大會諸衆皆以因緣發心開悟今説菩提不從因緣則彼外道拘舍梨等所説自然成第一義矣願垂開誨佛告阿難即如城中演若達多狂性因緣若得除滅則不狂性自然而出所謂因緣自然理窮是譬蓋以狂性既滅則自然性出未狂之先則因緣自然二皆無有何得先下自然二字由是觀之凡所謂因緣自然者本皆不有悉由狂妄而立故曰理窮於是且以因緣破自然若頭本自然則無所然而非自然也又何假照鏡因緣怖失頭而狂走乎如是則自然之計墮矣又以自然破因緣若頭本自然因照怖失而狂又何不自然因緣照鏡而失乎頭本不失狂怖妄出曾無變易何藉因緣如是則因緣之計墮矣若曰狂本自然怖亦本有則未狂之日狂何所潛若以不狂為自然頭本無失又何因緣而狂走乎是則因緣自然之説皆妄立也若悟本頭則識知狂走之為妄而因緣自然皆為戲論是故我言三緣斷故即菩提心若悟本頭則是能知本來面目而一切幻妄了不相關大修行人一切妄緣豁然蕩盡得大解脫者以此訶責戲論品第十三生滅滅法本非菩提對待既去名言自亡雖持多經祇益戲論菩提心生生滅心滅至如何自欺尚留觀聽何謂戲論若曰菩提心生生滅心滅此但是生滅法非菩提也若曰滅生俱盡無功用道但有自然則是自然心生生滅心滅此亦生滅非菩提也今又反指無生滅者明為自然何異世間以諸相雜和成一體者為和合性非和合者成本然性何者諸相不和各各有個本然之性故可指稱惟此不二法門既無對待自絶名言猶加稱謂非戲論乎直使然與非然合與非合合然俱非有言離合之心亦非也此如道經無無亦無之意又復結責阿難多聞無益雖持多經祇益戲論以故不免摩登之難非我佛頂神呪安能使彼淫心頓歇愛河乾枯令汝解脫是故阿難歷劫熏持不如一日修無漏業無漏業即首楞正定也能離世間憎愛二苦其速甚效能使摩登出纏耶輸授記汝何自欺尚留觀聽而以貪愛存於心目乎自決擇真妄發明覺性乃至深窮萬法決通疑滯皆為最初方便使其信解真正為因地心因心既真斯可圓成果地修證故前經止此此後別起更端決定二義品第十四一者生死妄根依於生滅二者煩惱根本生於根塵阿難及諸大衆聞佛示誨至皆合涅槃清淨妙德阿難躡前復請雖知因地要入因門願捐小乘畢獲如來無餘涅槃本發心路從何躡伏疇昔攀緣得大總持入佛知見佛言汝等決定發菩提心於佛如來妙三摩提不生疲倦應當審觀因地發心與果地覺為同為異若於因地以生滅心為本修因而求佛乘不生不滅無有是處以不生滅合如來藏則同矣以生滅心求常住果則異矣所以無有是處阿難汝見世間可作之法皆有變滅誰為不壞然終不聞爛壞虗空何以故空非可作由是始終無壞無滅夫己之一身則有壞之相也堅者為地潤者為水暖觸為火動搖為風由此四纏分汝圓湛覺明為視為聽為覺為察從始至終五疊渾濁纏為生死根本濁為惑業根本何謂之濁譬如清水與彼沙土二體之性本不相循為彼世人取彼沙土投於淨水是以土失留礙水亡清潔容貌汩然名之為濁汝身之濁凡有五重一曰劫濁二曰見濁三煩惱濁四衆生濁五曰命濁何為劫濁汝見虗空遍十方界覺則非空非色由一念不覺妄見空相以生發遍迷故空見不分雖見空而非本空之體雖有見而非妙明之覺二者相織成妄此無明初起混茫之相也故名第一重劫濁何謂見濁汝身現摶結四大以為體見聞覺知遭其壅塞而成留礙水火風土旋合覺知相織而成妄見是為第二重見濁何謂煩惱濁又汝心中憶誦記習由是於性之內分發為知見容之外分現為六塵根境煩搆離塵則無相離覺則無性性相相織而成幻妄是謂煩惱濁何謂衆生濁又汝朝夕生滅不停以造業緣戀著三界知見常留於世間隨趣受生業運常遷於國土如此相織妄成是謂四重衆生濁何謂命濁汝等見聞皆是湛圓中分原無異性由衆塵隔越相織成妄無狀異生故性中則相知用中則相背相知者原無異性也相背者無狀異生也同異失準相織妄成何謂同異失準適言其同而用又相背適言其背而性又相知故曰失準是第五重命濁汝等欲令汝之見聞覺知遠契如來常樂我淨應當先擇生死根本見聞覺知人之六根受用也常樂我淨佛之涅槃妙德也死生根本即前五濁業用言欲返妄契真先當擇去生死妄本依不生滅圓湛之性旋其虗妄使復還元覺得圓明覺無生滅性以為因地然後圓成果地修證如澄濁水貯於淨器靜深不動則沙土自沉清水現前此但名為初伏客塵煩惱而已及去泥純水得圓明覺則無明之根本永斷而覺湛明相於是精純一切變現不為煩惱皆合涅槃如去泥純水一任攪掏無復汩濁因地如此則果位修證無有不圓涅槃妙德無有不合者矣第二義者汝等必欲至彼六知根一時清淨第二義者汝等發菩提心於菩薩乘生大勇猛棄捐諸有為相應當詳審煩惱根本此無始來發業潤生誰作誰受若不詳審則不能知虗妄根塵何處顛倒處尚不知云何降伏取如來位汝觀世間解結之人不知所結云何知解未聞虗空有結可解者何以故空無相形無解結故則汝現前之結多矣眼耳鼻舌及與身心六為賊媒自劫家寶由此無始衆生世界生纏縛故於器世間不能超越此正言虗妄根塵顛倒之處自劫家寶自劫真性生纏縛顛倒也衆生世界即根身也器世間即三界也纏縛即結義世為遷流界為方位東西南北四維上下為界過去未來現在為世方位有十流數有三皆一切衆生織妄相成之相身中貿遷世界相涉何以故言衆生一身所具理自互涉身亦有界則先後左右也身亦有世即下三四四三宛轉流變者也然此權依世論以顯妙用大略云爾若夫一解六亡互用圓照則豈算數之所及哉今且以方涉世而論世間只有東南西北上下無位中無定方止有東西南北四數而已四數既明與世相涉三四四三宛轉十二流變相疊一十百千總括始終此蓋通舉增數增一為十增十為百增百為千共成三疊第一約四方各論三世共成十二第二於東方三世變一成十則成三十南西北方亦復如是四方各各三十成三四一百二十也第三於東方三十變十為百以成三百南西北方亦復如是四方各各三百又成三四一千二百也以方涉世如此則以世涉方其例可知佛言此者蓋指凡夫六根根塵相織世界相涉從粗至細所起塵勞大數如此莊子云萬化而未始有極也又據六根了別之性同故各各具有一千二百功德六塵了別之用異故又有優劣全闕之殊以眼言之惟有八百功德後方全暗左右傍觀三分之二以耳言之圓滿一千二百功德周聽則四方無遺靜聞則無有邊際以鼻言之惟有八百功德通息出入而缺中交如舌則圓滿一千二百功德轉味為言更覺妙用盡諸世間世出世智言有方分理無窮盡若身則惟八百功德合時能覺離時不知意則圓滿一千二百功德十方三世一切世間世出世法凡聖兼包盡其涯際阿難汝今欲造生死欲流返窮流根至不生滅當驗此六受用根於彼真性誰合誰離誰深誰淺誰為圓通誰不圓滿若能於此悟圓通根則能逆彼無始妄識業流得循圓通一門深入一入無妄彼六知根一時清淨圓六湛品第十五夫六根粘湛發妄故一湛則六亡根塵既消云何覺明不成圓妙阿難白佛言世尊云何逆流至云何覺明不成圓妙阿難白世尊云何逆流深入一門能令六根一時清淨佛告阿難汝雖已得須陀洹果已滅三界衆生世間見所斷惑然猶未斷思惑乃積生無始虗習必三果乃斷非阿難所知此惑斷盡六湛乃圓今汝且觀現前六根為一為六若言一者耳何不見目何不聞若成六者我今與汝宣揚微妙法門汝之六根誰來領受阿難言我用耳聞佛言汝耳自聞何關身口口來問義身來領承是故非一終六非六終一終不汝根元一元六當知是根非一非六由無始顛倒淪替於圓湛一六義生汝登初果雖得六銷猶未忘一六者粗惑妄結一者細惑法執須陀洹已斷粗惑不入聲色香味觸法是得六銷而尚滯法執是未亡一以後文證之此乃方得人空而未能成法解脫至俱空不生乃云亡一如彼太虗參合羣品由器形異名之異空除器觀空説空為一彼太虗空云何為汝成同不同何況更名是一非一則汝了知六受用根亦復如是知太虗之同異是非了無所立則一六併亡圓湛不分矣然六一既無而今現有六根者由粘湛發妄耳由於明暗二種相形於妙圓中粘湛發見見精映色結色成根此根之元目為清淨四大因名眼體方是之時如蒲萄朵是體雖具而識未流及乎流逸奔境則以染故轉名浮根四塵而不名清淨四大矣由於動靜二種相擊於妙圓中粘湛發聰聰精映聲卷聲成根元名清淨四大如新卷葉及乎浮根流逸奔境轉為四塵不為清淨由於通塞二種相發於妙圓中粘湛發嗅嗅精映香納舌成根元名清淨四大如雙垂爪及乎浮根流逸奔境轉為四塵不名清淨由於恬變二種相參於妙圓中粘湛發嘗嘗精映味絞味成根元名清淨四大如初偃月及乎浮根流逸奔味轉為四塵不名清淨由離合等二種相摩於妙圓中粘湛發覺覺精映觸轉觸成根如腰鼓顙流逸奔觸轉為浮根四塵不名清淨由生滅等二種相續於妙圓中粘湛發知知精映法攬法成根元為清淨四大如幽室見及乎浮根流逸奔法轉為四塵不名清淨阿難如是六根由彼覺明有明明覺失彼精了粘妄發光覺明真明也有明明覺妄明也前云性覺必明妄為明覺義盡如此是以汝今離暗離明無有見體離動離靜原無聽質無通無塞嗅性不生非變非恬嘗無所出不離不合覺觸本無無滅無生了知安寄可見六皆虗妄離塵悉無自體汝但不循動靜合離恬變通塞生滅明暗諸有為相隨拔一根脫粘內伏收聽返視伏歸元真發本明耀耀性發明諸餘五粘應圓脫不由前塵所起知見明不循根寄根明發由是六根互相為用粘妄則由前塵循浮故成隔礙粘湛則不循不由特寄根而已故耳亦可視眼亦可聽互相為用六用一原也豈不知今此會中律陀無目而見賢喜龍王無耳而聽恆河神女無鼻而聞香驕梵異舌而知味空身無身而覺觸如此會中摩訶迦葉久滅意根圓明了知不由心念汝今諸根若圓拔已內瑩發光如是浮塵幻相如湯銷氷成一圓融清淨寶覺故曰應念化生無上知覺圓妙如是如彼世人聚見於眼若令急合暗相現前六根黯然頭足相類若不假外明而內瑩發光是不明自發也則諸暗相永不能昏其妙若此若使根塵既消云何覺明不成圓妙究竟修因品第十六阿難誤認六塵緣影為自心性故疑離塵入滅將誰立因求無上覺故佛使羅睺擊鐘使驗根塵雖斷聞性不滅以此為因則七常住果於是可成阿難白佛言世尊如佛説言至云何不成無上知覺阿難白佛言世尊如佛説言因地覺心欲求常住若此見聽離於明暗動靜通塞畢竟無體猶如念心離於前塵本無所有云何將此畢竟斷滅以為修因求常住果烏得相應七常住果曰菩提涅槃真如佛性菴摩羅識空如來藏大圓鏡智諸佛所得曰菩提寂靜長樂曰涅槃不妄不變曰真如離過絶非曰佛性分別一切而無染著曰菴摩羅識一法不立煩惱蕩盡曰空如來藏洞照萬法而無分別曰大圓鏡智阿難誤認六塵緣影為自心性故云若無明暗見畢竟空如無前塵念自性滅進退循環微細推求本無我心及我心所將誰立因求無上覺於是佛為辨迷先使羅睺擊鐘使之驗根問汝聞不衆對曰聞鐘歇無聲問汝今聞不衆曰不聞復擊一聲問汝聞不又言俱聞是知因聲而起聞故聲歇而聞歇耳又敕羅睺擊鐘問今聲不俱言有聲少選聲銷問今聲不衆言無聲再擊一聲衆言有聲是知聲有生滅聞性常在故能隨感隨應迷情不了以聞同聲是以常為斷也佛告阿難聲銷無響汝説無聲若實無聞聞性已滅同於枯木鐘聲更擊汝云何知知有知無自是聲塵或有或無豈彼聞性為汝有無哉聲有亦非生聲無亦非滅此即不生不滅真常性也聞實云無復有誰知無者蓋知無者即汝聞性也是故當知聲於聞中自有生滅非為汝聞聲生聲滅令汝聞性為有為無也汝尚顛倒惑聲為聞何怪昏迷以常為斷乎終不應言離動靜通塞説聞無性如重睡人熟眠牀枕夢中聞舂杵聲是人夢中豈憶靜搖開閉通塞其形雖寐聞性不昏縱汝形銷命光遷謝此性云何為汝銷滅以諸衆生從無始來循諸色聲逐念流轉既不開悟性淨妙常逐諸生滅由是生生雜染流轉若棄生滅守於真常常光現前根塵識心應時銷落想相為塵識心為垢二俱遠離應時清明云何不成無上知覺以此為因則七常住果於是可獲
