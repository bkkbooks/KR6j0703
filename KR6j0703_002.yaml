body:
  text: 淮海參佛弟子蘊空居士陸西星述旨陳應徵校定真性常住第三承上遺失真性顛倒行事遂言遺失顛倒之由蓋見精明元乃我真性湛然常住本無遺失由顛倒見故似遺失也爾時阿難及諸大衆至與諸大衆踊躍歡喜阿難聞佛示誨身心泰然念無始以來失却本心妄認緣塵分別影事今得開悟願聞如來顯出身心真妄虗實現前生滅與不生滅故經復以波斯匿王起義以明不生滅性在纏皆具王引外道迦旃延毗羅胝子言死後斷滅名為涅槃佛言汝未曾滅云何知滅王言我觀前念遷謝新新不住如火成灰漸漸銷殞決知此身當從滅盡佛言王觀汝身年變月化遷改不停悟知汝滅亦於滅時知汝身中有不滅者耶我今示汝不生滅性汝年有童耄觀此恆河之水見有童髦不王言不也世尊佛言王面雖皺而此見精性未曾皺皺者為變不皺非變彼不變者原無生滅云何於中受彼生死王聞佛言頓悟真常不執斷見阿難即從座起禮佛至如來說為可憐愍者阿難起白佛言若此見聞必不生滅云何世尊名我等輩遺失真性顛倒行事於是佛垂臂輪手下指示阿難言汝見我手為正為倒阿難言若世間衆生率以此為倒而我不知誰正誰倒以垂為正以竪為倒真顛倒見也然此顛倒但首尾相換耳臂體本一由執情而改觀以例法身本同因顛倒而成異此類發明則知如來之身為正遍知汝等之身名性顛倒性無遺失以性顛倒故遺失爾且汝以何處號為顛倒得非認悟中之迷耶我常說言色心諸緣及心所使諸所緣法惟心所現色謂六根心謂意識心所使謂善惡二果依正二報法謂萬法謂此等種種皆生如來圓覺妙心如鏡中現像全體是鏡汝今幻妄身心皆是妙明心鏡所現直不即幻妄而悟妙明反乃遺本妙而執幻妄得非迷耶悟中之人於彼性體真空認為妙明而不認為晦昧於彼色相認為緣影而不認為實有蓋以圓妙明心本非空色全一真覺由妄塵瞥起五陰敝覆成晦昧相於是轉覺體為頑空晦妙明為妄色空色既立想相競生色想雜和遂有身相妄有緣氣於中積聚內則隨相蕩搖外則逐境奔逸昏擾擾相安得認為心體圓覺經云妄認四大為自身相六塵緣影為自心相獨非迷耶一復迷此遂謂此心決定在吾色身之內而不知此心大周沙界細入無倫譬之大海今汝認一浮漚以為全潮窮盡溟渤得非迷中倍人蓋漚波無體認為海水既已迷矣又認一漚以為大海全潮非迷中倍人乎迷中倍人顛倒行事如以手垂為正者然謂之遺失亦固宜爾阿難承佛悲救深誨至惟垂哀愍為我宣說阿難承佛誨旨因悟妙明心地常住不遺然我現以緣心聽法未敢認為本元心地故請拔除疑根佛告阿難汝以緣心聽法此但能緣之心因聲而有聲止則無亦非法性且我所說法如以手指月離指方能得月聞教自合觀心若以分別我說法音為汝心者此心自應離分別音有分別性矣其如離聲即無譬如客寄旅亭暫止便去終非常住若是掌亭之人終無所去無所去者稱為亭主若汝真心自是常住主人終無所去云何離聲便無不惟離聲無性但離諸色相分別亦無見相而有不屬於空離相而無不屬於色非色非空是在外道拘舍離等昧為冥諦不知此處正好商量且分別之性離塵而無是見色還色見聲還聲各有所還即如客寄旅亭暫止便還何為汝主於是發問正要討箇不還不去之主人而阿羅不知故請宣說妙明元心云何無還佛告阿難且汝見我至是故如來名可憐愍佛以妙明元心乃汝真心無朕發悟良難故花見精方便開示蓋見精明元即匿王觀河之見也此箇見精明元雖非精妙明心猶如二月非是月影何以故見精明元亦是緣塵之見雖屬於妄但無分別猶近於真取譬非遠如人揑目而見二月揑止則月復為一體非若水中之月端有二相而水中之月即緣塵分別之影事也去真遠矣學道之人不識真只為從前認識神無量劫來生死本癡人認作本來人惟此分別之性緣塵而有離塵則無故各有所還今為歷示有還之義觀此講堂見日則明吾以明還日輪見月而暗吾以暗還黑月通還戶牖壅還牆宇緣還分別頑還虗空𡋯還塵清明還霽此諸變化各還本因無不還者則汝見精當還何所若還於明則不明之時不復見暗彼八因者種種差別而此見精無有差別是見不隨境還亦既明甚彼可還者自然非汝其不還者非汝而誰於此見得則知汝心本妙清淨汝自迷悶喪本受輪名可憐愍此以見精明元為能見之性妙精明心為離見之體如第二之月即於月邊別有圓影非月實有此影乃揑目之妄所成以喻能見之性雖非離見之體非於體上實有斯見但虗妄所成耳阿難言我雖識此見性無還至性汝不真取我求實阿難又言我雖識此見精不還云何得知是我真性意謂我已識見精是第二月矣何謂真月佛令試於物象中決而擇之六凡四聖見量雖異見性不殊汝今諦觀四天王所住宮殿中間遍觀水陸空行種種形像於中分別自他誰是我體誰為物像極汝見源上極日月下極輪圍中極萬物凡所見者咸物非汝然物類雖殊咸汝見精清淨之所矚是汝非物此精妙明是非汝之見性乎汝若以見為物則我之見亦物也物則可見汝亦可以見吾之見矣如不能何若謂吾與汝同見是物謂之能見吾見可矣方吾離物之時汝又何以不能見吾不見之處乎縱使汝能見吾不見之處自然非彼不見之相蓋彼謂吾有不見之處是亦能見吾不見之處矣自然非彼不見之相何以故不見本自無相非汝見所能及也若不能見吾不見之相則見精自是非物見既非物非汝而誰若謂見是物者是物亦能見矣汝既見物物亦見汝有情無情體性紛錯畢竟世間以何作主故曰不成安立若汝見時是汝獨見非我所見見性廓然周遍法界清淨圓明即汝真性真性在汝而不自知反取我言以求其實耶此解頗明竟宜細玩阿難白佛言世尊若此見性至遍能含受十方國土阿難又白佛言若見性在我六凡四聖本無差別云何却有舒縮如我承佛神力觀初禪天王勝藏宮殿鄰日月宮此見周圓遍娑婆國土何其高廣退歸祇林秪見伽藍清心戶堂但瞻簷廡云何此見縮大成小為當墻宇夾令斷絶佛言此屬前塵大小不應說言見有舒縮譬如方圓器中各有定體除器觀空空乃無量離塵觀性自契本真汝謂入室之日縮見令小仰觀天日是誰挽見令高若築墻宇能夾見斷穿為小竇寧無斷續之迹乎是義不然無庸情計一切衆生隨塵失性為物所轉以故觀大觀小亦如空隨器變能轉物者即如除器觀空故即心圓明遍含國土蓋毛端國土本非大小合受之理不假神變但除情器即廓爾現前楞伽云未達境性心起種種分別達境性心已分別即不生真際云既滅前塵形量不立一切即一性乃圓成一毛含國土義蓋如此阿難白佛言世尊若此見精至唯垂大慈開發未悟阿難承佛指示已知見精是我真性則此妙性現在我前見必我真矣不知能見此妙性者復是何物蓋我以身心分別妙性而妙性則無分別未曾分別我身則我有分別之身心與彼無分別之妙性自是成兩正如月與月影終不可合而為一若現前所見實是我心令我能見則所見者實我而能見者非我故曰見性實我而身非我非我則我之身心終成外物何異如來前所難言物能見我乎阿難此問既存能所復落言筌終非正問而亦迷情之所難解者佛告阿難今汝所言至一時惶悚失其所守佛告阿難汝言見在我前是義非實若實在汝前汝能實見則此見精為有力所的可指示汝於祗林遍觀景物現在汝前無不可指若見在汝前亦當確指何者為見阿難答言見在物中與物揉雜雖大聖不能剖析必須離一切物別有自性佛言如是如是汝又發明此諸物中何者非見阿難又言物在見中一覽收盡我實遍見何者非見佛言如是如是夫即物非見離物無見二義無定佛皆以如是印之者蓋以色空等相如虗空華本無所有不可指定何得有是非是處是以大衆之中非阿羅漢者一聞惶悚茫然自失喪其所守如來知其魂慮交懾至故能令汝出指非指於是文殊師利從大衆中頂禮佛足合掌恭敬而白佛言此諸大衆不悟如來發明二種精見色空是非是義若此前緣色空等象若是見者當有所指若非見者應無所矚而今不知二義所歸還是見耶抑非見耶特請如來發明此諸物象與此見精元是何物無是非是佛告文殊十方如來及大菩薩自住三摩地中了知萬法惟一圓融清淨寶覺見與見緣并所想相如虗空華本無所有見根也見緣境也所想識也了諸緣法同是菩提妙淨明體云何於中有是非是蓋是天上真月本無第二及彼水中之影知其真者中間自無是月非月之辨如汝是文殊豈得復有是文殊者如是世尊我是文殊豈得復有是文殊者若有是文殊者文殊則有二相我必不真若真文殊必無二相是尚不立安得加非佛言此見妙明與諸空塵亦復如是妙明之見喻如文殊真文殊也空塵見緣所謂是文殊者二文殊也然此見緣依真而起如第二月誰為是月又誰非月但見真體則是非自忘故曰但一月真中間自無是月非月是知汝今若觀見塵而發明終沉妄想如以指喻指終有彼我之是非故不能出彼是非之網由真精妙覺而發明者則為真見如以非指喻指可出是非得無分別出指非指即出是非是互換之文同一意旨出謂出情計之網言是非雙泯也分別外道品第四阿難白佛言世尊至見性斷滅云何見明阿難又白佛言誠如法王所說覺緣遍十方界當住不滅則與外道梵志所談冥諦投灰所說真我有何差別世尊前言見性周遍非汝而誰又言即心圓明遍含國土即所謂覺緣遍十方界常住不滅者然而黃髮之流亦說真我遍界所立冥諦謂真性冥冥體非生滅外道非能見性乃識情妄計混濫真說耳又世尊曾於楞伽山為大慧說外道常說自然我說因緣非彼境界我今觀此覺性自然非生非滅遠離一切虗妄顛倒似非世尊前說之因緣與彼外道所說之自然矣夫既非生滅則似乎自然既非自然則似乎因緣既云遠離又非因緣云何開示佛告阿難我今如是方便開示汝猶惑為自然若謂自然必須甄別有個自然之體汝今觀此妙明中以何為體若以明為體者應不見暗以空為體者應不見塞蓋自然之體不隨境變今皆不然非自然矣阿難言必此妙見性至虗空云何隨汝執捉阿難言今此妙見必非自然今我發明是因緣生但心猶未明云何合因緣性佛言此見亦非逐因緣生汝今見性現前為復因明因暗因空因塞而有若因明有應不見暗若因暗有應不見明乃至因空因塞義同明暗又若緣空有見應不見塞緣塞有見應不見空乃至緣明緣暗義同空塞是知精覺妙明非因非緣亦非自然非不自然無非不非無是非是蓋因緣自然是非等相皆是妄情遍計分別精覺妙明本無是事故當離一切相遍計既離則圓成實體觸處現前無非法性所謂但離妄緣即如如佛汝今云何於中措心以諸世間戲論名相而得分別如以手摩虗空秪自勞耳虗空云何受汝執捉阿難白佛言世尊必妙覺性至悲淚頂禮承受聖旨阿難又問必此妙覺非因緣者世尊云何嘗與比丘宣說見性具四種緣所謂因空而有因明而顯因心而知因眼而見是義云何佛云我說世間諸因緣相非第一義諦阿難我復問汝世人說我能見云何名見云何名不見阿難答言世人因於日月燈光見種種色相名之為見無此三種光明則不能見故名不見不知此真見妙明非和非合不逐境生不隨境滅若無三種光明之時名為不見者合應不見黑暗若必見暗此但謂之無明耳何謂無見若明不見暗暗不見明如是二相俱可名為不見若復明暗二相自相凌奪非汝見性於中暫無則是二相俱可名之為見是故當知明暗通塞皆為緣塵俱非見體必須離相見見亦復當知見見之時見非是見蓋四義成就明暗通塞已知見體之離相矣而見見之時見豈為見乎蓋當人自有箇見見者在而見物之見非真見也天真見之體猶自離見而非見所能及又豈諸言說之所能及哉故自然因緣及與和合離緣離相言說不及妙菩提路自非聲聞之徒狹劣無識之所與知吳興問見精屬妄何以真見復見於妄答夫見精者映色之性也見雖屬妄其性原真當知見見之時別無所見只是見於見中之性耳若未見性性在見中同名見精若能見性性超於見方名見見見妄品第五爾時世尊憐憫阿難至何況分別非燈非見阿難一聞見見非見之旨轉增迷悶又復啓請佛為指陳一切衆生二種顛倒分別見妄何謂二種一者衆生別業見妄二者衆生同分見妄別業者一人妄見也同分者多人妄見也由此妄見循造妄業當處發生隨業受報云何為別業妄見如世間人目有赤眚夜見燈光別有圓影五色重疊然此圓影為是燈色為是見色若燈色者人當同見而何以目眚之人對燈獨見若是見色見已成色而彼圓影燈乎見乎名為何等是知不由境起不由根起乃從眚起而即燈即見者妄矣又若此影離燈而有應非眼矚云何眚人目見圓影是即燈而見者既無實體離燈而見者又無定處而離燈離見者妄矣是故當知色實在燈見病為影影之與見成於目眚故曰影見俱眚然而見眚者則非眚也故曰見眚非病何者目有眚病則見圓影而見其有眚病者則我妙明真精本來無病不受眚病者也故能卓見我眼今有眚病眼眚若除真見自復本體如如常住不動終不應言此眚是燈是見於中復有非燈非見正如天上止惟一月見真月者安得復言有第二月乎何者第二之月揑目所成全是虗妄不應窮詰是有形耶是無形耶離見而成者耶非離見而成者耶此之燈影義亦如是了其無體何用擬心云何名為同分妄見至清淨本心本覺常住云何名為同分妄見譬彼閻浮提中若干國土若一國人同感惡緣則彼衆中覩一切不祥境界日月星辰陰陽灾變種種惡戾之相無不具見而彼別國衆生本所不見亦復不聞此謂同分妄見吾今為汝以同分別業法喻互顯進退合明如彼別業見者燈中圓影但由眼眚而起非燈所造特根之妄非見妄也故曰眚即見勞非色所造然非眚者終無見咎例汝今日以目觀見山河大地國土衆生本來無實亦似燈中圓影見燈影者為有眚病則此無實境界亦可名為無始見病之所成何以故同無實故圓覺經云一切諸衆生無始幻無明如彼虗空華依空而有相意蓋如此夫我眼根之見與彼見緣之境雖則現前然亦不能造眚此眚原我覺明見所緣者之所造覺緣於物而起分別即為覺所緣者此實造眚惟我本覺明心覺諸緣者則非眚也本覺如好眼覺明如眼病根境如燈影但覺所覺之眚則此覺已不墮於眚中所謂見病非眚此實見見云何復以覺聞知見眚中之事而名之哉前云見見之時見非是見正答此問是故汝今但見人見我及諸世間十類衆生皆屬見眚非見眚者蓋當人自有箇見眚者在乃本來見體名見精真性不得名見前云見非是見意蓋如此其曰同分妄見者是以別業為例以彼一人例此一國一人病目燈影由生一國瘴惡灾變互起見影見灾同歸妄見又復以此一國例彼大千同是覺明無漏妙心依真起妄見聞覺知虗妄病緣和合妄生和合妄死若能遠離諸和合緣及不和合則是除滅諸生死因圓滿菩提不生滅性清淨本心本覺常住溫陵曰諸和合緣乃因境而起妄念粗相不和合者離緣獨證乃法執細相能虧菩提起生滅污淨心淪本覺故當遠離是已覺非和合品第六阿難先悟本覺妙明本非因緣非自然性而猶未明如是覺元非和合生非不和合此為覺心餘塵故世尊再與辨之復舉前塵而問阿難汝雖先悟本覺妙明性至及諸群塞亦復如是阿難汝以一切世間妄想和合諸因緣性而自疑以為證菩提心由和合起作是見者則汝以為妙淨見精為與明和為與暗和為與通和為與塞和設一有所和即涉妄塵而非妙淨若和明者明已現前何處雜見見之與相目擊可辨明見相雜作何形像若謂明非見者云何見明似相雜矣明若即見誰為見見又似非雜雜則必和而此見體圓滿何處和明明體圓滿自不和見是見必異明而不與明雜雜則失彼妙明淨性而謂見與明和非其義矣彼暗與通塞例自可明亦復如是復次阿難又汝今者至及諸羣塞亦復如是和者雜而不辨合則附而不離上明和義如水和土此明合義如蓋合函復次阿難彼妙淨見精亦復不與明暗通塞等合若與明合至於暗時已無明相此見合明亦當隨時滅去如何復與暗合而能見暗若見暗時不與暗合則見明者應當不與明合不與明合則不見明不見明者云何謂之與明相合而了知明之非暗耶彼暗與通及諸羣塞亦復如是阿難白佛言世尊如我思惟至及諸羣塞亦復如是阿難白佛言世尊我今思惟此妙覺元與諸緣塵及心思慮非和合耶佛言亦非非和合義和謂與明暗通塞等和也凡物之不和者兩下皆有邊畔汝且諦觀何處是明何處是見在見在明自何為畔求畔不得非非和矣不惟求畔不得亦且畔義不成若明際中必無見者則此見與明自不相及相及乃為有畔今自不知明相所在云何成畔畔義不成非非和矣彼暗與通及諸羣塞亦復如是又若謂非與明暗通塞等合者則見與明根境乖角如耳之與明了不相觸今且不知明相之所在云何甄別合與非合之理邪今見境既不乖角又似非非合者彼暗與通及諸羣塞義亦如是顯示藏性第七自卷初發明覺性廣辨真妄及至重開彗目再掃餘塵至此身心灑落真妄兩亡斯可顯示如來藏性使知根塵處界法法圓明物物顯現是謂造悟修證根本也阿難汝猶未明一切浮塵至迷悟生死了無所得阿難汝猶未明一切浮塵諸幻化相當處出生隨處滅盡本無有生亦無和合幻妄稱相而已原其本性真為妙覺明體蓋幻無自性依真而立如華起空全體即空如泡生水全體是水故曰其性真為妙覺明體如是乃至五陰六入從十二處至十八界因緣和合虗妄有生因緣離別虗妄名滅殊不知本如來藏常住妙用不動周圓妙真如性性真常中求於去來迷悟生死了不可得問真如之性人人具有本無生死去來奈何今之實有邪曰以不真常故有真常則不有矣譬之空水目病則華風激則泡豈真常哉若睛明澄湛求其華泡復可得乎五陰色如空華受如觸掌想如說梅行如瀑流識如餉空阿難云何五陰本如來藏至本非因緣非自然性云何五陰本如來藏妙真如性蓋以幻無自性依真而立如彼華依於空泡依於水如來藏當人法身妙性也依果而稱曰如來含攝衆德曰藏常住不動遍足周圓妙萬物而至神性一切而不異曰妙真如性能見是性則迷悟生死了不可得矣何謂五陰色受想行識五者成體蔭蔽妙明也以色陰言之譬如有人以清淨目觀晴明空唯見晴空逈無所有其人無故不動目睛瞪視發勞則於虗空之中別見狂華復有一切狂亂非相色陰當知亦復如是淨目晴空喻以淨智觀妙性故逈無所有勞目華空喻以妄因緣妄色故別見狂相然是色陰不因境有不自根出譬彼狂華不因空生不自目出若從空來則有出入有出入者非虗空相非空則實自不容其華相起滅如阿難體中不容阿難可見華不起於空中若自目出目能有見出既見華入當見眼若無見者出既翳空入當翳眼又出眼見華眼應無翳無翳之眼則是好眼何以必見晴空無華方稱好眼不自眼出三折明矣是故當知色陰虗妄本非因緣非自然性即如來藏妙真如性以下四陰皆當例此阿難譬如有人手足至本非因緣非自然性以受陰言譬如有人手足百骸宴安調適忽忘我身本無諸受其人無故忽以二掌於空相摩便生澀滑冷熱諸相是諸幻觸不從空來不從掌出若空來者既能觸掌何不觸身豈是虗空選掌而觸若從掌出應不待汝合摩而生又若自掌出者出則有入出時掌既有知入時臂應有覺知出知入自有一物身中往來又何待合掌而後知覺受陰虗妄本非因緣非自然性三折明矣阿難譬如有人談說至本非因緣非自然性以想陰言譬如有人談說酢梅口中出水思踏縣崖足心酸澀是口中水不自梅生不從口入若云梅生梅尚不能自談安能令人口水若從口入口自合間何須待耳若獨耳聞此水又何不自耳中而出思踏懸崖其義類是是故想陰虗妄本非因緣非自然性三折明矣阿難譬如瀑流波浪至本非因緣非自然性以行陰言妙湛妄動逐境轉徙念念遷謝新新不停譬彼瀑流波浪相續如是流性不因空出不因水有亦非水性不離空水若因空生則諸十方無盡虗空成無盡流世界自然俱受淪溺若因水有則流應離水別有體相方所今應現在若即水性則何以澄清之時別無流體又且離空離水不得空非有礙水流其間水外無流流終依水行陰虗妄本非因緣非自然性四折明矣阿難譬如有人取頻伽瓶至本非因緣非自然性以識陰言譬如有人取頻伽瓶塞其兩孔滿中擎空千里遠餉滿中之空喻識陰也性空真覺周遍法界一迷為識局在妄身之中如空貯瓶中空無往來不可擎餉以隨瓶故步有千里之行他國之餉喻性無生滅無舍受以依妄身故逃形於此受身於彼迷性成識妄隨輪轉義亦如是然此虗空非彼方來非此方入若彼方來彼方既擎空去彼方應少虗空若此方入此方開瓶彼方應見空出虗空無體計有出入皆為虗妄識陰虗妄本非因緣非自然性三折明矣夫身心萬法即如來藏妙真如性大覺將與覺之故此卷之初權與明倒正辨緣影擇見精示真量一就其倒迷情計為之拂心眼之塵翳洗肝腸之垢濁使之心境灑落真妄兩忘然後融會入如來藏遂知根塵處界無非妙真如性此二卷及三卷大旨也
