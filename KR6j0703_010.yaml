body:
  text: 淮海參佛弟子蘊空居士陸西星述旨王法祖校定四行陰阿難彼善男子修三摩地至此則名為行陰區宇五陰前粗後細故想盡則無粗重影事雖觀萬象而無想念故如鏡鑑之明無粘無迹虗受照應了無陳習唯一精真明極如此故幽隱行陰於是披露也行為萬化生滅相根元故其想披露凡彼十二類生之元無不殫見然雖未能見彼修因趨果因由諦緒已能總見生類但由行起名此行陰者為同生基若此清擾熠熠元性至幽隱妄想以為其本生滅不停業運常遷名衆生濁即行陰之體也故行陰盡者則能超之阿難當知是得正知至是人墜入二無因論夢想消亡寤寐常一故稱正知奢摩它又稱凝明正心皆想盡之相也外境皆由心召故想盡凝明則天魔不至從此唯是修禪失趣狂解妄計是即陰魔也生類本即同生基也於本類中生元露者於同生基見己之行元也幽清動元即行元也既見此已遂以一切生滅皆圓於此而不進窮識因本末遂立二無因論二無因論其目有二自此以下十種皆禪那狂解皆是行陰用心交互故現斯悟一者是人見本無因至墮落外道惑菩提性生機既破則根離區穴而眼清淨故能洞見衆生業流灣環隨業輪轉不能自出以其未脫識陰定力有限故八萬劫外冥無所見以無所見故計本無因也生機全破機喻擾動即行陰也不為想陰所覆故云全破二者是人見末無因至名為第一外道立無因論謬執生根不達化理以人竟為人乃至黑竟為黑無復改移因而例我本不見道末亦無成故曰末無因也二遍常論其目有四阿難是三摩中諸善男子至不曾散失計以為常由妄計行陰為生滅圓元遂於心境四大八識行等皆起妄計或撥生滅而計常或存生滅而計常或認識神而計常或起邪見而計常今此窮心境性本無因無生滅故以十方衆生生滅之理皆則循環本無散失此撥生滅而計常也想陰盡者依心境二法修觀故功力能知二萬劫事後四萬八萬例此二者是人窮四大元至不曾散失計以為常衆生依地水火風生滅而四性元則常住則諸生滅法皆有體常此存生滅而計常者也三者是人窮盡六根至窮不失性計以為常六根及末那執受即八識也心意識中本元即識神也八識元由惟佛八地菩薩能窮若真能窮盡則入知境離心意識今此惟得心意識中本元由處謂其本性恆常衆生依之循環而住不曾散失此認識神而妄計也四者是人既盡想元至因心所度計以為常想元想陰也生理行陰也妄謂流轉生滅皆屬想心今已永滅則不生滅理自然屬行不知行陰即生滅元是起邪見而妄計也由此計常亡正遍知至名為第二外道立圓常論三四顛倒見其目有四又三摩中諸善男子至彼生滅者真無常性妙明圓湛離我我所而外道於此妄立神我從是計我偏凝不動遂以為常而諸衆生於生於死計他無常二者是人不觀其心至劫不壞處名究竟常謂三禪以下終為三災所壞名無常種性四禪以上災不能壞名究竟常三者是人別觀我心至從我流出名無常性前於一法作無計此於一性作二計皆妄計也四者是人知想陰盡至今已滅盡名為無常幻陰一體遷流一相而且執是執非見今見昔而以流者為常遷者為滅由此計度一分無常至名為第三外道一分常論四有邊論其目有四又三摩中諸善男子至是人墜入四有邊論分位有四乃生滅分位也一者是人心計生元至計相續心名為無邊生元流用行陰也因遷流計三際以過者已滅來者未見故名有邊見在相續故名無邊不知真際本非有邊非無邊也二者是人觀八萬劫至不得無邊之心但有邊性我曾下謂但見彼人現我知中而不能知彼人性遍故計彼性以為有邊四者是人窮行陰空至名為第四外道立有邊性五矯亂論其目有四又三摩中諸善男子至令彼前人遺失章句此觀萬化見其不齊遂生異解不能決擇故矯亂其語二者是人諦觀其心至除無之外無所言説互互無念念滅相也三者是人諦觀其心至除是之外無所言説各各有念念生相也四者是人有無俱見至不死矯亂遍計虗論六計後有正計旁計又三摩中諸善男子至死後有相發心顛倒無盡流即行相續也以生滅滅盡相繼不絶故知死後有相或自固身云色是我至如是循環有十六相前色即目前云色行中相續亦色也作此四計受想行亦然故成十六相從此從此或計畢竟煩惱畢竟菩提兩性並驅各不相觸旁計有為無為諸法畢竟並驅者計煩惱菩提不相陵滅皆後有也由此計度死後有故至死後有相心顛倒論七計後無正計旁計又三摩中諸善男子至如是循環有八無相陰性消散謂色受想滅也生理即行也謂無受想則行亦滅也此約四陰現前因亡未來果滅因果合論故成八相從此或計涅槃因果至死後無相心顛倒論八計八但非正計旁計又三摩中諸善男子至死後俱非起顛倒論行存即有相也受想滅即無相也以前後相例則存者終無雖有非有滅者會有雖無不無四陰雙計故成八非色受想中見有非有至皆言死後有相無相三陰為滅相本雖有不有遷流為存相故觀無不無隨得一緣於四陰中隨舉一陰又計諸行性遷訛故心發通悟有無俱非虗實失措諸行一切遷流法也因見行陰遷訛不定遂有邪悟謂一切法有無俱非不可定指由此計度死後俱非至死後俱非心顛倒論九計斷滅正計旁計又三摩中諸善男子至是人墮入七斷滅論見行陰念念滅處名後後無由是妄計設入人天七處後皆斷滅或計身滅或欲盡滅至現前消滅滅已無復身滅即欲界人天二處也欲盡初禪也苦盡二禪也極樂三禪也極舍四禪及無色也是名七際謂七際事相皆現前消滅更無復生終歸斷滅由此計度死後斷滅至死後斷滅心顛倒論十計涅槃正計旁計又三摩中諸善男子至如是循環五處究竟轉依者轉生死為涅槃也或於欲界悟圓明理遂以欲界即轉依處或以初禪離欲二禪離苦三禪極喜極舍即轉依處是謂五涅槃也不知皆屬有漏非無為果非究竟處由此計度五現涅槃至作大覺王清淨標指吳興曰此云心魔後識陰云見魔即煩惱魔也五識陰阿難彼善男子修三摩地至此則名為識陰區宇通敘行滅識現也行為世間遷流之體性擾動生機之綱紐補特酬業之深脈能隱晦性天馳逸六根泪擾內湛為浮根塵究竟樞穴故行陰盡者生機綱紐倐然隳裂感應懸絶而性天將大明悟六根無復馳逸以不馳逸故內外湛明以無樞穴故人無所入反動而靜深之又深故曰內外涅槃性天為五陰所覆昏如長夜前三陰盡如雞初鳴雖為曙兆猶沉二陰精色未分此行陰盡如雞後鳴唯餘一陰故將大明悟也受命元由識陰也以行滅識現故深達無樞穴故可觀無遷流故可執無生機故不召遂了十方依正皆識所變故已獲其同性天精色雖未明徹而幽祕之相已漸發現此識陰之相也若於羣召已獲同中至顛倒妄想以為其本羣召同中即十二類之命元識陰也若於此中以定慧力消磨六門使根合而不分界開而不隔則見聞圓通六根互用由是外之世界內之身心無復留礙此識陰盡之相也性木一真由塵隔越性用之間同異失準名為命濁為識陰之體故識盡則超之識乃妄覺影明原無自體由顛倒起故名罔象虗無顛倒妄想識陰狂解其目有十阿難當知是善男子至背涅槃城生外道種識由行流故識空則返元既空行陰故已滅生滅尚依識元故寂滅未圓而能漸破識陰消磨六門故已六知根㳷合無隔諸類覺性通融不二故能入於圓元圓元即融根隔通諸類之識元也若以此為真所歸地而立為真因則墮因所因執蓋真因非所有所皆妄娑毗外道認阿賴耶識未形之前冥然初相為所歸真因正同此也以心有所得果有所歸即因即果皆墮所妄所以違圓通背涅槃今人於真性輒起識心計因果生見解有所得有所歸皆則得於識元歸於冥諦而已阿難又善男子窮諸行空至生大慢天成遍圓種執識元為自體而謂一切衆生自此流出遂執我能生彼而實不能故曰能非能執摩醯首羅即色頂魔王也妄計我能現起無邊衆生亦能非能之類也能為心能事果者依我能為彼依能成彼事也大慢即醯羅也又善男子窮諸行空至背涅槃城生倒圓種以識元為所歸依故疑彼能生我及一切法遂計生起流出之處為真常無生之體此則在生滅中妄計常住既惑真不生性又迷見生滅法以非常為常故名常非常執既計彼能生我即與計自在天能生一切者同由依識元妄計常住故曰妄因依心成妄計果前計我圓生物此計彼圓生我故名倒圓又善男子窮諸行空至背涅槃城生倒知種所知即所觀識陰也謂識有知而一切法由知變起因計知體圓遍諸法遂立異解謂無情遍皆有知無所揀擇故曰無擇遍知此則以無知為知故名起知無知執婆吒霰尼二外道也執一切覺謂執一切有知也此謬計圓知以為因心則果終虗謬矣以無知為知是倒知也又善男子窮諸行空至背涅槃城生顛化種識陰盡者消磨六門諸根互用今此未盡才得隨順而已因隨圓互於是計一切法皆能圓化發生勝果謂火能顯發光明乃至塵能成就器界遂則邪求邪觀勤心崇事謂能生勝果而實不能故名生無生執即三迦葉波諸外道之儔也即迷真心從物求冀則因果皆妄顛倒化理名顛化種又善男子窮諸行空至背涅槃城生斷滅種觀理不實誤墮虗無故於圓明性中計皆空虗於是滅絶羣化歸於永滅而不知其非名歸無歸執舜若多此云空言無想舜若即執空外道也以執斷空故圓虗無為之因心成空亡之斷果永滅依即外道涅槃也又善男子窮諸行空至背涅槃城生妄延種識陰精明湛不搖處名之為常今見其常乃執色身同此精圓也身本無常實不可貪以為長久今堅執著故云貪非貪執阿斯陀此云長壽仙彼雖延常終歸壞滅今欲固妄身以冀長住則空長勞耳妄延耳又善男子窮諸行空至背涅槃城生天魔種以識陰為命元而互通三際以為識陰若盡我命亦盡誰證真常故便於定中化諸欲境以留塵勞不令銷盡依此邪思欲證真常而不知其非名真非真執吒枳迦羅能化欲境自娛即欲頂自在天類也因此邪思感生天魔惟恣塵欲名熾塵果又善男子窮諸行空至背涅槃城生纏空種命明者深窮識陰深明衆生受命因由也以生滅由識精粗由業故依四諦分別決擇以苦集為粗偽以滅道為精真於是專修道因求感滅果以少為足故居滅即休斯特聲聞上慢之儔也此則圓精應為因心成趣寂之小果精應者即決擇粗業唯求精應證於偏真纏空趣寂而已背清淨道淨謂常樂我淨之德四德之中略舉一耳又善男子窮諸行空至生覺圓明不化圓種融淨覺明即識精也雖無惑習圓融清淨而未離於識故名覺明若以此為深妙立為果證則定性緣覺獨覺而已此即圓覺㳷為因心成湛明之滯果湛明即圓融覺明也所覺止於圓明識精而定性不回故名覺圓明不化圓種以上陳五十魔境皆是識精錯解邪悟未得正見擬心動念皆墮其中雖證緣覺辟支猶為迷佛菩提亡失知見所以覺皇苦口垂慈勦心辨析欲人不迷不失也阿難如是十種禪那至從始成就不遭岐路前妨心魔此妨見魔如是法門先過去世至究竟修進最後垂範最後請益第三十微有刪約阿難重白佛言如佛所説至五陰本因同是妄想明妄無因不容計度也知妄所起可説因緣不知所起因緣何有況推自然得非妄計五陰妄本一色本堅固汝體先因父母想生至名為堅固第一妄想想為虗妄影像欲愛深脈遺體自想愛流出故曰體因父母想生陰心乘想愛冥求故曰心於想中傳命酢梅等説以驗體因妄結故與妄理相應若非妄倫則妄不能感也體因想生心因想起命因想傳諸想交固以成色陰故名堅固妄想二受本虗明即此所説臨高想心至名為虗明第二妄想臨高空想而酸澀真受違順皆妄而損益現馳則受陰無體虗有所明故名虗明妄想三想本融通由汝念慮使汝色身至名為融通第三妄想念慮虗情也色身實質也虗實不倫而能相使者由想而融也心生虗像形取實物心形異用而能相應者由想而通也至於寤寐擾變使心隨境使境隨心皆融通妄想也四行本幽隱化理不住運運密移至名為幽隱第四妄想五識本罔象又汝精明湛不搖處至第五顛倒微細精想若是精真不容習妄此破其常也精謂精明真謂恆常何因下示妄習相昔覩奇物納種在識若不受熏復覩前異必無記憶既不忘失則知中間常為無明念念熏習熏習即妄何精真之有乎似無曰罔似有曰象五陰邊際阿難是五受陰五妄想故至湛入合湛歸識邊際五陰言因界者本自無界因妄想因也陰滅次第此五陰元重疊生起至何所不明再此詢問識譬則劫波巾也色譬則最後結也結依巾有故生因識起解因次第故滅從色除五陰生起從細至粗由迷知有識乃至由受有色也滅則從粗至細必破色而後受現乃至破行而後識現也理則頓悟乘悟併消者如巾本無結亦不有也事非頓除因次第盡者中根必假漸修也若因悟忘修則有解無行執理迷事適墮偏邪終非正修真三摩地汝應將此妄想根元至知有涅槃不戀三界令以此義自覺覺他永斷妄元齊歸正果阿難若復有人遍滿十方至算數譬喻所不能及十波羅夷即十重罪阿難若有衆生能誦此經至皆大歡喜作禮而去
