body:
  text: 勸持敘師子林沙門惟識撰首楞嚴王具足萬行總持三昧熏修奢摩他路開示衆生妙在一門超出由慶喜恨多聞而未全道力故迦文因妄見而直指人心七處之徵寶鏡磨塵而本明自現八還之辨金錍刮膜而幻影隨消斥攀緣則心不是心示真覺則見猶離見即顯真而破妄仍即妄以談真窮陰入處界而列為四科因緣自然二俱排擯會地水火風而通名七大真俗中道三諦圓融本如來藏而含吐十虗隨衆生心而發揮諸相乃至一多相即小大互容現寶剎於毫端轉法輪於塵裡得無礙者倒想銷於億劫不隨分別者狂心歇即菩提圓頓機已解密因中下器須陳妙行於是開遠客還家之路指天王賜屋之門詰諸聖之本因依證悟説最初方便順此方之教體選音聞為第一圓通次為攝心乃重施戒依先世尊舉指清淨明誨現化身佛宣演祕密伽陀三學圓具而所證非偏諸妄銷亡而不真何待況復精研七趣隨業受生痛喻六交因習招報示五十種禪那之境深防愛見魔邪具八萬種解脫之機對治塵勞煩惱保持覆護囑勸弘宣在始在終無非修證了義或破或立不離常住真心琴瑟箜篌既逢妙指林木池沼皆演法音令諸闡提隳彌戾車從三摩地得無生忍或自分真而安直聖位或從互用而超至後心坐大道場登無上覺一切事究竟堅固廣開菩薩多方便門十方界任運縱橫同入如來妙莊嚴海其教至矣厥功懋哉愧余之謬而妄擬會通樂法之深而重加讚勸幸諸方之學者試一披而覽焉敘終
