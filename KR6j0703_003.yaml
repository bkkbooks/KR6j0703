body:
  text: 淮海參佛弟子蘊空居士陸西星述旨淮南後學夏範龔延庚同校定六入根緣於塵發覺居中名為覺性此覺性者離塵無體全是虗妄知妄者誰乃真如性復次阿難云何六入至本非因緣非自然性自眼入言即彼目睛發勞空華狂亂同是菩提瞪發勞相此相因於明暗二種發見居中吸此塵象名為見性若使此見離於明暗二塵畢竟無體無體之見非妄而何又此虗妄之見無所從來非明暗來非於根出非從根生若從明來遇暗則滅應無見暗若從暗來遇明隨滅應無見明若從根生必無待於明暗離此明暗則如是見精無自性矣是又似從明暗生非根生也若從空出空屬前塵歸當見根又空自觀何關汝入既無所從則非因非緣非自然性而眼入之虗妄不言可知妄無自性全體即真了知虗妄則如來藏妙真如性顯矣如圓覺經云空華既滅空性不滅也阿難譬如有人以兩手指至本非因緣非自然性以耳入言譬如有人以指塞其兩耳耳根發勞則聞頭中作聲此亦菩提勞相因於動靜發聞耳吸塵象名聽聞性此聞虗妄離此動靜二種妄塵畢竟無體此个聞性非動靜來非於根出不自空生本無自性當知耳入虗妄了知虗妄聞者是誰本如來藏妙真如性阿難譬如有人急畜其鼻至本非因緣非自然性以鼻入言譬如有人急畜其鼻畜久成勞則於鼻中聞有冷觸因觸分別通塞虗實及諸香臭同是菩提勞相因於通塞二種妄塵發聞居中吸此塵象名齅聞性離此二塵畢竟無體當知是聞非通塞來不於根生不於空出本無自性鼻入虗妄從可知已妄無自性不離本覺非如來藏妙真如性乎阿難譬如有人以舌䑛吻至本非因緣非自然性以舌入言譬如有人以舌䑛吻熟䑛令勞有病覺苦無病覺甜不䑛之時淡性常在兼舌與勞同是菩提勞相其因則由二種甜苦與淡妄塵發知居中吸此塵象名知味性此性離彼甜苦與淡二塵畢竟無體不因淡有及甜苦來不由根出不自根生本無自性舌入虗妄不言可知知味者誰非如來藏妙真如性乎阿難譬如有人以一冷手至本非因緣非自然性以身入言譬如有人以一冷手觸於熱手若冷勢多則熱者成冷若熱功勝則冷者成熱是觸也冷熱互奪初無定勢合則有覺離則無知亦無定性如是以此合覺之觸顯於離知寧有自性但相涉之勢一成則或冷或熱均為菩提勞觸其因則由離合二種二塵之妄發覺居中吸此塵象名知覺性此知覺者離彼離合違順二塵畢竟無體非離合來非違順有不於根出又非空生若合來時離當已滅云何覺離違順二相亦復如是若從根出必無離合違順四相則汝身知都無自性若從空出空自知覺何關汝入可見全是虗妄阿難譬如有人勞倦則眠至本非因緣非自然性意入生於憶知憶知生於寤寐故托睡寐以明之覽憶為生失忘為滅而住異處乎其中既覧而憶旋失而忘是謂顛倒吸習妄塵中歸意根前念後念次第相續塵塵不絕故曰不相踰越此意入之相兼意與勞同是菩提勞相其因則因於生滅二種妄塵集知居中吸撮內境法塵想像內發聞見所及能反緣五根緣所不及之地如追憶夢境五根不能及也五根但能順緣現境意根則能逆緣前境故曰見聞逆流流不及地此名覺知之性離彼生滅寤寐二塵畢竟無體然是覺知之根非寤寐來非生滅有不於根出亦非空生反復窮詰一無實義何以故若從寤來寐即隨滅將何為寐必生時有滅即同無令誰受滅若從滅有生即滅無誰知生者若從根出寤寐二相隨身開合莊子云其寤也形開其寐也形交故云隨身開合離斯寤寐則此覺知同於空華必無體性若從空生自是空知何關汝入是故當知意入虗妄本非因緣非自然性十二處六根六塵名十二處或依根辨或依境辨二處俱無自性同是虗妄復次阿難云何十二處至本非因緣非自然性一眼色處試觀祇陀園林及諸泉池莫非色也我以能觀之眼對此所觀之境為是色能生眼見邪眼能生色相耶若謂眼根能生色相者是眼為色性方其舉眼見空之時空已非色色性應銷銷則一切都無色相既無對誰而明空質蓋以色空二法對待而顯既無色相何以顯空然則計眼生色相者妄也若謂色塵生眼見者觀空之時空已非色焉能生見見既銷亡亡則無見以誰而明空色然則計色生眼處者妄也可見見與色空俱無處所二處虗妄本非因緣非自然性阿難汝更聽此祗陀園中至本非因緣非自然性二耳聲處汝更聽此園中鐘鼓音聲先後相續為是聲來耳邊耳往聲處若聲來耳邊既來此處彼處應無如我乞食城中則祗林無我又若聲來此人耳邊彼人應不俱聞云何一千二百五十比丘一聞鼓聲同來會食若復耳往聲邊如我歸祗林城中自是無我汝聞鼓聲其耳已往鼓處鐘鼓齊擊應不俱聞何況其中象馬牛羊種種音響又若彼聲不來我耳不往自是無聞聞義不立然則聽與音聲俱無處所計往計來二處皆妄本非因緣非自然性阿難汝又齅此爐中旃檀至本非因緣非自然性三鼻香處旃檀一銖香聞四十里但取香有殊勝之力不須更言聖人根力強利也阿難爾當二時眾中持鉢至本非因緣非自然性四舌味處汝於乞食之時或遇上味此味為復生於空中生於舌中生於食中若生舌中舌得一味何能推移若不變移何名知味又舌非多體云何一舌而知多味若生於食食非有識何能自知縱食能知知不在汝何預於汝而名知味若生於空汝噉虗空當作何味假作鹹味舌觸知鹹既觸汝舌亦觸汝面汝身受鹹當作海魚既甞受鹹了不知淡鹹淡無知何名知味是故當知味舌與甞俱無處所即甞與味二俱虗妄本非因緣非自然性阿難汝常晨朝以手摩頭至本非因緣非自然性五身觸處若汝晨朝以手摩頭此摩所知誰為能觸為能在頭為能在手若無手者頭則無知云何成觸若在頭者手乃無用云何名觸若妄分能所則在頭在手各各有觸必須兩身方能定其處所汝阿難者豈有兩身若頭與手各為一觸則手與頭當為一體觸須兩物成義若一體者觸則無成若二體者在手在頭觸為誰在又在能非所在所非能不應虗空與汝成觸是故當知覺觸與身俱無處所即身與觸二俱虗妄本非因緣非自然性阿難汝常意中所緣善惡至心非所緣處從誰立六意法處汝常意中所緣善惡無記三性生成法則此法為即心所生為當離心別有方所善惡緣慮心也無記昏住心也意緣不出此三性而吸撮內塵成所緣法此法若從心生即法即心不得謂之法塵非心所緣安得指而成處若離於心別有方所則試問法之自性為有知耶為無知耶知則名心而與汝之非塵者異同他心量而與汝之即心者同蓋非塵乃汝之自性不緣諸法者也即心乃汝之情識緣法而生者也云何於汝更有二心如此則法性之非知亦明矣若云非知則此法塵既非色聲香味離合冷煖及虗空相之有方所當於何在既於色空之內無所表顯不應存於色空之外況空又非有外者也則心緣意處終無實矣是故當知法則與心俱無處所則意之與法二俱虗妄本非因緣非自然性十八界界種族也如欲界色界之界言自為一類也根塵識三各各有六分內中外為十八界一依根辨一依境辨一依根境合辨皆虗妄無自性一眼色界復次阿難云何十八界至本非因緣非自然性阿難如汝所明眼色為緣生於眼識此識為復因眼所生以眼為界因色所生以色為界如汝所明乃小乘所解因緣生法皆非實事不了即空故據彼詰之此識若因眼生不有空色則識無所緣見無所表而界亦無從立矣若因色生則當空不見色之時汝識應滅云何識知是虗空性乎若見滅時汝獨能識其變遷是色滅而識不滅也汝識獨存獨則無隣界從何立若色滅而識亦滅是從變而變變則無體界相自無若不從變則識性常恒既從色生則有見於色者寧不知空之所在理又不然非從色矣又若根境相合共生識界則一半有知一半無知中自離異故曰合則中離中既相離則未免有知者合根無知者合境故曰離則兩合如此體性雜亂二義推窮皆不成界是故當知眼色為緣生眼識界三處都無俱為虗妄諸妄併除真如自顯二耳聲界阿難又汝所明耳聲為緣至本非因緣非自然性耳主聲司聽因於動靜二相發識居中然亦不因耳生何以故若使動靜二相寂不現前則耳不成知知尚無成識何形貌若取耳聞無動無靜聞性常在方其無動無靜之時聞尚不成云何以雜色觸塵之耳形便得名為識界如是則依根而辨者皆虗妄矣又依境而辨亦復不因聲生若謂識生於聲則是識因聲有不關我之聞性若無聞性何以能知聲相之所在乎是知識因聲生者許其因聞而有聲相也聞能聞聲何不聞識既不聞識何成界義若縱耳能聞識則識與聲聞識已被聞又有誰來知我聞識邪蓋聞有能所聲為所聞識為能聞若謂耳能聞識則識不過屬於所聞誰為能聞若無能聞則有所無能終如草木又不可也依根依境單論不可不應以根與境雜成識界而為中位界無中位則內外二相復從何成中間識也內外根境也中位既無界從何立是知聲聞與識三處俱無本非因緣非自然性三鼻香界阿難又汝所明鼻香為緣至本非因緣非自然性又汝所明鼻香為緣生於鼻識此識為復因鼻所生以鼻為界因香所生以香為界乎若識因鼻生則汝心中以何為鼻為取肉形雙爪之象乎為取齅知動搖之性乎若取肉形肉質乃身身之所知者觸也肉為身質觸乃身塵奧尚無名界從何立若取齅知則汝心中以何為知以肉為知則肉之所知觸而非香以空為知空則自知肉應非覺知在虗空則空乃汝身汝身非知則阿難之身空無所在矣此計識因鼻生者妄也若以為香知知自屬香何預於汝若香臭之氣必生汝鼻州彼香臭二種流氣不生於伊蘭栴檀之中二本不來汝自齅鼻為香為臭臭則非香香則非臭二氣相反二俱能聞則汝一人應有兩鼻對我而問道者有二阿難誰為真體若鼻惟一根境云何二臭既為香香復為臭二性互奪從何立界是故當知鼻香為緣生鼻識界三處都無本非因緣非自然性四舌味界阿難又汝所明舌味為緣至本非因緣非自然性此識若因舌生則諸世間黃連薑桂之類都無有味汝自甞舌為辛為苦若舌性苦誰來甞苦舌不自甞誰為知覺問二誰字分明見有个識性者在若舌性不苦味無所生無物與對云何立界若曰識因味生識自為味即識即味不能自甞同於舌根何以得知是甜是苦又使識因味生則世味既多識亦應多識體若一云何又能分別諸味變異不一之相若無分別又不名識云何復名舌味識界舌味和合是中原無自性云何立界是故當知舌味與識三處俱無本非因緣非自然性五身觸界阿難又汝所明身觸為緣至本非因緣非自然性此識若因身生必無離合云何觸合則有觸離則無是無緣則無識因境而不因根明矣若因依而辨無身則無知離合者是又因根而不因境又以根境合辨觸不自知有身方知是此身識必由根境相合而顯合則知身即觸知觸即身若身即觸則身不得單明為身若觸即身則觸不得單明為觸如此身觸互奪故無處所合身則身無觸位故觸無體性離觸則身無觸用故即同虗空內外中間皆不成立即使識生於觸從誰立界然則身觸為緣生身識界三處都無本非因緣非自然性六意法界阿難又汝所明意法為緣至本非因緣非自然性意法為緣生於意識若識因意生以意為界識因法生以法為界今復明其不然若識因意生則汝意中必有所思以發明汝意有所思者法也境也若無此境則意無所生而識將何用又汝識心與諸思量兼了別性同乎異乎識心者意也諸思量者法也了別之性識也同則意云何生異則不能起識何者若使三者相同則誰為能生誰為所生故曰同意即意意云何生三者相異則三性乖角焉能起識故曰異意不同應無所識無識則同於草木云何意生有識則意本無形云何識意惟同與異二性不成界云何立若識因法生則世間諸法不離五塵汝觀色聲香味與觸均名為法相狀分明以對五根各有所屬而非意之所攝汝決定謂識依法生汝今諦觀法塵之法作何狀貌若離色空諸相終無所得生則色空諸法等生滅則色空諸法等滅既非意攝又無實狀所因既無因生有識作何形相相狀不有界云何立是故當知意法為緣生意識界三處都無則意與法界二俱虗妄本非因緣非自然性初以六入破六根雖以塵對破而正意却在根次以十二處雖根塵互破而正意惟在塵次以十八界根境識三相推破而正意惟在識七大前近取諸身顯如來藏故依陰入處界四科以明雖悟一身未融萬法根境尚異見性不圓此復遠取諸物圓示藏性故依地水風火空見識七大以明使悟物我同根是非一體法法圓成塵塵周遍法界頌云若人欲識真空理身內真如還徧外情與無情共一體處處皆同真法界此七大之旨也謂之大者以性圓周遍含吐十方為義所以有七者萬法生成不離四大而依空建立因見有覺因識有知前五無情所具後二有情兼之七大皆因識變故總之以識識則覺性之中妄為明覺者也所妄既立生彼妄能故有七大七大先非水火亦非空識全一如來藏體循業發現而已阿難白佛言世尊如來至如水成冰冰還成水佛告阿難如汝所言四大和合發明世間種種變化此實權教雖說和合都無實義蓋彼四大性果非和合則如虗空不和諸色殆不然也若果和合則同彼萬變相成相續展轉虗妄如旋火輪無有實體又無休息又不然也且以大性非和非合之理設為譬喻如水成冰冰還成水水何合而成冰冰何和而成水不因和合循業發現其相如此一地大汝觀地性麤為大地至但有言說都無實義汝觀大地麤為大地細為微塵至鄰虗塵析之極微極微之塵猶有微色名色邊際相更析鄰虗而為七分即微色鄰虗彼鄰虗者即實空性若此鄰虗析成虗空當知虗空與出生色相一鄰虗塵用幾虗空和合而有又鄰虗析空用幾色相合成虗空如是則知此變化諸相非和合法明矣又若色合則純是一色不得名之為空空合則純是一空不得名之為色色猶可析空云何合耶汝原不知如來藏中性色真空性空真色言空能性色色亦性空性即性一切心之性當作活看空能性色者自無而有也色亦性空者自有還無也性色故變化諸相性空故塵析成空然皆清淨本然周循法界不消和合隨眾心生應所知量循業發現而世間無知惑為因緣及自然性皆是識心分別計度但有言說都無實義何者如來藏中萬法一如而循業似異遂有七大之名特體用異稱耳性色真空一如之體也性空真色即循發之用也色本虗妄亦以真言以其體用不二故相依而互舉欲人知其不離妙性耳亦猶水之成冰不離於水眾生背覺合塵故發塵勞然使滅塵合覺則現真如心量隨應循發所謂萬法一如意蓋如此然觀相原妄無可指陳觀性原空惟覺妙明理絕情謂不容妄度所以擬心即差動念即乖但一切時中不起妄念不用識心然後相應二火大阿難火性無我寄於諸緣至但有言說都無實義阿難火性無我寄於諸緣汝觀城中求食之家手執陽燧日前取火然是火相非和非合蓋凡言和合者詰之各有根本如我與汝等一千二百五十人和合一處眾雖為一詰其根本各有各字氏族若此火性因和合有汝試詰之各無根本為從鏡生為從艾出為於日來若於日來自能燒汝手中之艾來處林木皆應受焚若於鏡出自能於鏡出然於艾鏡何不鎔紆汝手執尚無熱相若生於艾何假日鏡光明相接然後火生若言非和非合汝又諦觀鏡因手執日從天來艾本地生火從何方遊歷於此日鏡相遠非和非合不應火光無從自生汝猶不知如來藏中性火真空性空真火清淨本然週遍法界隨眾生心應所知量一處執鏡一處火生徧法界執滿世間起起徧世間寧有方所循業發現意葢如此惑為因緣及自然性是皆識心分別計度但有言說初無實義三水大阿難水性不定流息無恒至但有言說都無實義阿難水性不定流息無恒如室羅城諸大幻師求太陰精合諸幻藥於白月晝手執方諸承月中水此水為從珠出為從空有為從月來若從月來尚能遠方令珠出水所經林木皆應吐流何以必待方諸林木不流又似此水非從月降若從珠出此珠常應流水何待中宵對月若從空生空性無邊水當無際從人洎天皆當汩沒云何復有水陸空行可見本然周遍非和合矣若言非和非合汝更諦觀月從天陟珠因手持承珠水盤又是人造水從何方流注於此月珠相遠非和非合不應水精無從自有汝尚不知性水真空性空真水清淨本然周遍法界隨眾生心應所知量一處執珠一處水出滿法界執滿界水生生滿世間寧有方所循業發現義蓋如此惑為因緣及自然者皆是識心分別計度但有言說都無實義四風大阿難風性無體動靜不常至但有言說都無實義阿難風性無體動靜不常汝整衣入眾僧伽梨角動及傍人則有微風拂面此風為復從袈裟角出為發於虗空及生彼人面若從衣角汝乃披風其衣飛搖應離汝體我今垂衣而坐汝看我衣風何所在若在虗空汝衣不動何因無拂空性常住風應常生若無風時虗空當滅滅風可見滅空何狀若有生滅不名虗空名為虗空云何風出若風自生披拂之面從彼面生當應拂汝汝自整衣云何倒拂若云非和合者汝審諦觀整衣在汝面屬彼人虗空寂然不參流動風自何方風空性隔非和非合不應風性無從自有求風何從杳莫可究信謂本然周徧循業發現汝宛不知如來藏中性風真空性空真風清淨本然周徧法界隨眾生心應所知量一人動衣有微風出徧界衣動拂滿國土周徧世間寧有方所循業發現惑為因緣及自然性者皆是識心妄計分別但有言說都無實義五空大阿難空性無形因色顯發至但有言說都無實義阿難空性無形因色顯發如室筏羅去河遙處諸剎利種新立安居鑿井求水出土一尺於中則有一尺虗空出土一丈還得虗空一丈虗空淺深隨出多少此空為復因土所出因鑿所有無因自生若無因而生未鑿土前何不無碍惟見大地逈無通達若因土出則土出時應見空入若土先出而無空入云何謂之空因土出若無出入則應空土合為一體原無異因土出之時空何不出若因鑿出則鑿自出空應非出土不因鑿出則鑿自出土云何見空是即因不可離因亦非汝復諦審諦觀鑿從人手隨方運轉土因地移如是虗空因何所出鑿者是實空者是虗虗實二者不相為用然非和非合不應虗空無所從而自出也以上巧辨皆遣識心妄計而顯圓融真體知此虗空性圓周徧本不動搖當知現前地水火風通名五大均此圓融周徧皆如來藏本無生滅非因非緣亦非自然妄計忖度皆汝識神非真實諦義但爾弟阿難汝心昏迷不悟四大元如來藏當觀虗空為出為入為非出入若悟虗空性圓周徧本無出入即悟性真圓融本無生滅矣汝全不知如來藏中性覺真空性空真覺清淨本然周徧法界隨眾生心應所知量如一井空空生一井十方虗空亦復如是圓滿十方寧有方所循業發現義蓋如此一井空喻一法性十方空喻萬法性由一觀萬由自觀他性無二別特形器妄辨耳六見大阿難見覺無知因色空有至但有言說都無實義阿難見覺無知因色空有汝在祇陀林中朝明夕昏設居中宵白月則光黑月便暗因見分析則此見為復與明暗相并太虗空為一體耶非一體耶或同耶非同耶異耶非異耶若原一體則明暗二體相奪明時無暗暗時無明必一於明則明亡必一於暗則暗滅云何既見於明又復見暗若明暗殊見無生滅則又不成一體矣若此見精與暗與明非一體者試離明暗與虗分析見元作何形相若明暗與虗三事俱異從何立見是又非異體矣夫明暗相背云何或同離三無見云何或異分空分見本無邊畔云何非同見明見暗性非遷改云何非異汝更審諦審觀明從太陽暗從黑月通屬盧空壅歸大地如是見精因何所出見覺空頑非和非合不應見精無所從而自出也當知見性圓徧本不動搖亦無生滅汝更沉淪不悟汝之見聞覺知本如來藏但觀此見聞覺知為生為滅為異為同為非生滅為非異同蓋生滅同異皆因妄塵非生非異不離妄計離此妄計即如來藏汝曾不知如來藏中性見覺明覺精明見清淨本然周徧法界隨眾生心應所知量如一見根見周法界聽齅甞觸覺觸覺知妙德瑩然周徧法界圓滿十虗寧有方所循業發現世間無知惑為因緣及自然性皆是識心分別但有言說都無實義七識大阿難識性無源因於六種至但有言說都無實義阿難識性無緣由於六種根塵妄出汝今徧觀此會聖眾用目循歷猶如鏡中無別分析此為真性汝識於中次第標指此是文殊此富樓那此識了知為生於見耶生於相耶生於虗空耶為無所因突然而出耶若云生於見中如無明暗色空四種則無汝見見性尚無從何發識可見生於見者非矣若云生於相中不從見生既不見明又不見暗明暗不矚即無色空彼相尚無識從何發可見生於相者非矣若云非見非相而生於虗空非見則無辨非相則滅緣處此二非之間若云識生於空則同於無辨若云有識又不同於物相縱發汝識欲別何物乎可見非見非相而生於空者又非矣若云無所因突然而出何不於晝日之中突然別見明月乎汝更細微詳審見託汝睛相推前境可狀者成有不相者成無如是識緣由何所出耶識動見澄非和非合聞聽覺知亦復如是何謂識動見澄識有分別名之為動見無分別律之為澄動則搖其本然澄則返其真純如此非和非合聞聽覺知例亦如是皆非和合又非自然可見性真圓滿湛然不涉諸妄本無所從兼之七大皆如來藏本無生滅汝心粗浮曾不了悟識觀六處識心為同為異為空為有為非同異為非空有蓋元不知如來藏中性識明知覺明真識妙覺湛然徧周法界含吐十虗寧有方所循業發現世間無知惑為因緣自然皆是識心分別計度但有言說都無實義性識明知言性此識者皆我之明知明知即良知之義覺明者識也識雖覺明之咎其體實真故曰覺明真識體用不二真妄一如所以互舉文中初言汝元不知次言猶次言尚次言宛次言全次言曾又復言元皆有次第淺深初言元不知者言元本自迷所以不知再與明知猶且不諭故次言猶後復與明而益不知故次言尚轉不知故言宛渾不知故言全甚不知故言曾終不知故言元初意恕之終意責之輕重之序如此深別曰審審議曰詳當理曰諦諦視曰觀初於地大獨言汝觀於火大言諦其言更諦觀審諦觀至見大重叠而言至識大番覆而言意同言宛言曾之類為其轉不知渾不知甚不知故也造悟讚謝第八爾時阿難及諸大眾至於如來前說偈讚佛爾時阿難及諸大眾蒙佛如來微妙開示身心蕩然自初決擇心見終至陰入七大多方發明使悟器界萬法當體全真本如來藏所謂微妙開示也既悟器界性真圓融故身心蕩然同無碍悟妙覺湛然周徧法界故各各自知心遍十方也覺湛周徧含吐十虗故見十方空如手中葉萬法性真本如來藏故一切所有皆即妙心悟本心量廣大如此故反觀妄身其微如塵其幻如漚忽無所有而本妙常心了了悟獲於是深慶說偈讚謝妙湛總持不動尊首楞嚴王世希有妙湛總持即如來藏體前之屢稱妙覺湛然不動周徧含吐十方者是也人雖本具要由首楞大定而發佛之所以為佛持此而已故阿難以是讚佛又覺海圓澄物不能汩曰妙湛藏心圓遍含裹十方曰總持體寂如空常住不滅曰不動具此而獨尊三界由此而為諸法王求之世間實為希有銷我億劫顛倒想不歷僧祇獲法身無始迷真妄認緣影即億劫倒想一蒙開示了獲本心故不歷僧祗法身即獲阿僧祗此云無量數劫願今得果成寶王至終不於此取泥洹既悟自性深感發明之思故願有所成弘道利生稱佛心而上報也願得成果智心也還度眾生悲心也智悲雙運廣大無量深心也誓入五濁不取泥洹則深心之極也憑此報恩故請佛為證大雄大力大慈悲至於十方界坐道場既讚謝已重請復說盡除惑障成果願也前發明心見顯如來藏方破見道粗惑次須決通疑滯開修證門以斷修道細惑詳審盡除乃登上覺第四卷決通疑滯攝伏攀緣即審除細惑之方也然既消顛倒想頓獲法身疑已得果且又願求更除細惑者佛果有七曰菩提涅槃真如佛性菴摩羅識空如來藏大圓鏡智所謂獲法身者則分得菩提自見佛性而已見性之後必須審除細惑使生滅滅生俱寂以合乎涅槃真如白淨純凝以合乎菴摩羅識廓然圓照以合乎空如來藏大圓鏡智七果圓備乃登上覺也舜若多性可銷亡爍迦羅心無動轉舜若多此云空爍迦羅此云堅固謂空性無體尚可銷亡我心堅固終無動轉此依楞嚴定力結前願心自誓究竟畢無退墮願心如此然後聖果可期佛恩可報也
