body:
  text: 淮海參佛弟子蘊空居士陸西星述旨廣陵後學孟應麟校定見結知解第十七阿難白佛言世尊如來至云何是中更容他物言此根塵識三譬如交蘆互相依倚其體全空既無自性則隨緣轉變故於知見立知識之心則結而為無明之本知見無知識之妄則解而入涅槃真淨之門既曰真淨豈容立知總示妄結依根塵識起但妄識不立則妄結自解爾時世尊重宣此義而説偈言宣義説偈第十八真性有為空緣生故如幻無為無起滅不實如空華言真性之中有為之法皆空則根塵本空而緣生之法皆如幻矣緣生之法如幻則起滅之法亦無起滅之法既無可見妄識元無故識性虗妄猶如空華亂起亂滅實無自性言妄顯諸真妄真同二妄妄法既無真亦不立若言妄顯真真還同妄猶非真非真云何見所見中間無實性是故若交蘆以真同妄是以真為非真也真尚非之為非云何見中復存所見乎當知俱無實體若交蘆然結解同所因聖凡無二略至發明更解脫結解二句牒同是六根更非他物汝觀下牒根塵無體但因妄結迷晦下頌知見立知四句解結因次第六解一亦亡根選擇圓通入流成正覺六解則根一亡則湛圓選得圓根則入聖流成正覺矣陀羅微細識習氣成暴流真非真恐迷我常不開演阿陀羅此云執持謂執持種子發起現行即第八梨耶初起之相故曰微細含藏種子為習氣積生識浪為瀑流湛由是分結由是起此識依真如合生滅雜乎真妄之間故曰真非真若以為真恐迷妄習而自認以為非真恐迷自性而外求故權小教中常不開演自心取自心非幻成幻法至幻法云何立一切諸法惟心所現而於中取著妄成根結是自心取自心非幻成幻法也由妄取故有幻非幻若不妄取非幻亦無非幻尚無幻法何有幻法不立則根塵頓淨圓通現前矣是名妙蓮華金剛王寶覺至一路涅槃門此之法門于淨不著于染不汙名妙蓮華根境結惑擬之即銷故名金剛王寶覺即為無為忘情絶解名如幻三昧依此進修一彈指間可超無學而入圓位阿毗達磨此云無比法十方如來逈出生死速證寂常莫不由斯故曰十方薄伽梵一路涅槃門薄伽梵佛尊號綰巾示結第十九於是阿難及諸大衆至若欲除結當于結心巾體本同因結有異譬汝六根同一妙明真性因逐妄隨緣遂成六結隔閡不通無復成一若能隨根脫粘內伏六既融一一亦斯亡然欲解此結左右偏掣終不能解左右偏掣喻二邊皆不能破無明根本如凡夫外道以斷常為二邊二乘菩提以空有為二邊雖云斷伏猶存中結故解結者當于結心解即分散於結心者知見立知即無明本觀於中道是謂結心選擇圓通第二十隨汝心中選擇六根一結若除塵相自滅諸幻銷亡不真何待阿難我説佛法從因緣生至退藏密機冀佛冥授我説佛法從因緣生所謂因緣非取世間六度等事和合粗相也如來發明世出世法世謂六凡出世法謂四聖知其本因從所緣出知此十界皆由於心隨無明之染緣則生九界隨教行之淨緣則出佛界是故隨汝心中選擇六根根結若除塵相自滅諸妄銷亡不真何待此根初解先得人空者了煩惱結皆由著我於我無障離煩惱障是得人空也空性圓明成法解脫者了所知結皆由著法於法無著離所知障是得法空也名法解脫人法雙忘是名俱空而俱空亦泯心無所起是從正受得無生忍吳興曰人空是見惑法空是思惑所得密言還同本悟即前心猶未達六解一亡義也言本悟若此而未能徹悟則與未聞何異故願如來成就最後開示爾時世尊普告衆中至從何方便入三摩地十八界即是六根開合七大統攝於此前文使汝生死輪轉安樂妙常同是六根更非他物以後二十五菩薩各舉所證憍陳那五比丘即從座起至如我所證音聲為上此阿陳等以聲塵悟入者四諦謂苦寂滅道優波尼沙陀即從座起至如我所證色因為上此以色塵悟入者香嚴童子即從座起至如我所證香嚴為上此以香塵悟入者藥王藥上二法王子至如我所證味因為上此以味塵悟入者跋陀婆羅并其同伴至如我所證觸因為上此以觸塵悟入者摩訶迦葉及紫金光比丘尼至如我所證法因為上此以法塵悟入者阿那律陀即從座起至旋見循元斯為第一此以眼根悟入者周利槃特迦即從座起至反息循空斯為第一此以鼻根悟入者憍梵鉢提即從座起至還味旋知斯為第一此以舌根悟入者畢陵伽婆蹉即從座起至純覺遺身斯為第一此以身根悟入者知此深痛不數句知即覺也言雖以覺覺痛而我清淨覺心一味純覺無有覺痛之痛覺如是則痛痛之覺皆緣妄起直須遺去幻身純守本覺以故攝念未久身心忽空緣此以證無學須菩提即從座起至旋法歸無斯為第一此以意根悟入者諸相入非謂諸相皆入於非相非相實相也舍利弗即從座起至光極知見斯為第一此以眼識悟入者眼識明利故一見即通識清淨故種種通利心無際故見覺圓明普賢菩薩即從座起至分別自在斯為第一此以耳識悟入者心聞發明內證也分別自在外用也孫陀羅難陀即從座起至明圓滅漏斯為第一此以鼻識悟入者前數息依根所以攝心此觀息依識所以駐心息由風火而起鼓煩惱濁故其狀如煙六交見火燒息能為異煙紫焰皆煩濁所發淨觀發明則煩濁斯銷故內明外虗而煙銷成白及乎漏盡無復煩惱內瑩發光故出入息悉為光明富樓那彌多羅尼子至消滅諸漏斯為第一此以舌識悟入者富那説法第一辨才無礙因以除魔滅漏皆舌識之力也何謂轉輪佛以身口意三輪應物無滯音聲即口輪也優波離即從座起至一切通利斯為第一此以身識悟入者性業謂殺盜淫事根於性者遮業謂支末愆失因過遮止者波離律中得度皆以身識欽承三千八萬毫無差失大目犍連即從座起至久成清瑩斯為第一此以意識悟入者因緣深義謂非世間和合粗相乃發明世出世法故因之發心得大通達神通如意也旋湛者從意識而入妙湛故久成清瑩通力圓明清淨自在也烏芻瑟摩於如來前至登無上覺斯為第一此以火大悟入者多淫之人本由暖觸生為欲火死為業火業力增盛成猛火聚遍觀四大皆是觸塵之境百體四肢地也諸冷暖氣即水火風也三昧既著故曰神光內凝以多欲人火大遍盛故化欲火而成智火持地菩薩即從座起至成無上道斯為第一此以地大悟入者身界二塵乃至刀兵皆是地大所造之色即為因緣所生之法與塵無差空也本如來藏妙真如性自性不觸謂知其虗妄發塵故毫無染觸塵銷智圓乃成無上知覺月光童子即從座起至圓滿菩提斯為第一此以水大悟入者琉璃光法王子即從座起至傳一妙心斯為第一此以風大悟入者傳一妙心者知風力無依萬動皆妄而能獨證本覺無動也虗空藏菩薩即從座起至妙力圓明斯為第一此以空大悟入者於同發明謂於圓洞心內瑩發光而交徹融攝也以珠表色以鏡表心色從心造全體是心故放寶光灌十方等彌勒菩薩即從座起至得無生忍斯為第一此以識大悟入者圓成實三性也一遍計所執性橫執衆生壽者我及我故乃至情非情異有實體性故周遍計度也二依他記性計有因緣世間和合建立名相執此假相定從種出雖無我執自然種性假色心等為種生五蘊等法也圓成實性即無漏智體真空法界也識以圓明入圓成實者由妙圓識心證入實智不復迷識逐境種種計著也大勢至法王子與其同倫至得三摩地斯為第一此以根大悟入者念屬意根意根若淨諸根自攝故無選擇念佛得忍者謂以淨念蠲濁想正受滅邪受邪濁既遣心境空寂一切不生名無生忍如此則自性佛土淨故可攝行人歸也觀經曰夫念佛者不得一彈指間念世五欲是謂繫念脫能如此一無間雜則無量性光自然發明所謂不假方便自得心開者也
