body:
  text: 淮海參佛弟子蘊空居士陸西星述旨廣陵後學陳遇時校定天趣諸天皆相躡增升種種不一各以類聚若或使之而實無使之者自食其報當如是也如今審戶三等九則誰能定之由己之物力致然也若乃巨富之家不消等則竟稱上上戶矣故後云此但示凡識升進若深智體之亦可頓證不消漸進其説良是欲界六天四天王天忉利天須𦦨摩天兜率天樂變化天他化自在天四天王天阿難諸世間人不求常住至如是一類名四天王天未能離欲但能窒欲使愛水不流則湛性澄瑩故命終之後能生初天夫六天皆由修五戒十善而致今但約欲微增勝者而言蓋以欲愛為輪回根本前之淪墜固始于此此之超騰亦始于此若使初心未能成就禪定智慧但能疾斷根本亦庶乎輪回可出而生天可冀矣忉利天於己妻房淫愛微薄至如是一類名忉利天日月居西彌山腰忉利居其頂上此天愛薄于前故報居其上以澄瑩增明故能超而增勝不得全味者未全清淨之味以尚有微愛在也須𦦨摩天一名時分天逢欲暫交去無思憶至如是一類名須𦦨摩天六欲下二名地居天上四名空居天不須日月而常明但以蓮華開合而分晝夜故又名時分天兜率陀天一名知足天一切時靜有應觸來至如是一類名兜率陀天天有內院外院三災至三禪而此不及者約內院言之精微不接皆內院事也樂變化天我無欲心應汝行事至如是一類名樂變化天諸天皆有報境而此天樂自變化以受用越於下天故名越化他化自在天無世間心同世行事至如是一類名他化自在天諸欲樂境不勞自化皆由他化而自在受用名他化自在阿難如是六天形雖出動至自此已還名為欲界雖出塵擾未能絶欲色界十八天初禪三天二禪三天三禪三天四禪九天初禪三天梵衆梵輔大梵阿難世間一切所修心人至如是一類名梵衆天不假禪那等者言此人雖非正修真三摩地無正智慧但修六行伏欲使愛染不生則不留欲界粗惑不染淨報現前故應念而生梵世初名梵衆則兆庶而已梵輔則王臣也大梵則天王也欲習既除離欲心現至如是一類名梵輔天初天但能執身伏欲此天又得定戒相應以順律儀行梵德故超之也身心妙圓威儀不缺至如是一類名大梵天前由淨心威儀戒行而進至于妙圓清淨又加以明悟超達則盛德之至故為梵王阿難此三勝流一切苦惱至諸漏不動名為初禪欲流則趨於生死雖六天未足為勝此天已出欲流背生死而趨勝淨故四禪皆稱勝流已離欲界八苦故曰煩惱不逼已離散動欲心故曰諸漏不動二禪三天少光無量光光音阿難其次梵天統攝梵人至如是一類名少光天此躡大梵之行而升進者具戒定慧故曰圓滿以圓滿故能澄凝其心不隨境動而寂湛生光然此初能脫粘復湛其光尚劣故名少光二禪以上無有語言但以定心發光光有勝劣分其高下光光相然照耀無盡至如是一類名無量光天定力轉明妙光迭發境隨光淨遍成琉璃吸持圓光成就教體至如是一類名光音天諸世界中教體不同故娑婆以文字香積無文字言説但以衆香此天以圓光成音而發宣化法故名光音阿難此三勝流一切憂懸至粗漏已伏名為二禪初禪方得漏心不動而未能伏此天已伏粗漏則業漸劣行漸勝而憂懸較之苦惱則竟輕矣三禪三天少淨無量淨遍淨阿難如是天人圓光成音至如是一類名少淨天由上圓光教體披露妙理發成精行離前喜動而生淨樂是樂非境乃出乎淨性恬泊寂靜名寂滅樂而淨力猶劣則但能通而已未能成也以猶劣故曰少淨淨空現前引發無際至如是一類名無量淨天淨空者離諸喜動不緣物境之定相也由是擴充使淨相無際協乎妙性故身心輕安而性樂成矣以無際故名無量淨世界身心一切圓淨至如是一類名遍淨天淨空無際故世界身心一切圓淨淨德成就則性歸託于是矣托謂托此以歸寂阿難此三勝流具大隨順至歡喜畢具名為三禪四禪九天四根本福生福愛廣果無想五不還無煩無熱善見善現色究竟四根本天前之禪行但能自利未能利他至四禪乃兼修慈悲喜捨利他之心名曰無量善無漏觀慧諸禪三昧悉從此出故名四根本天阿難復次天人不逼身心至如是一類名福生天苦樂頓捨名為粗重相滅捨念清淨故淨福性生捨心圓融勝解清淨至如是一類名福愛天苦樂二忘故捨心圓融心無所纍故勝解清淨由是福無遮礙而得妙隨順自有漏禪定而發無漏行至于究竟故曰窮未來際定福如此為可愛樂故天名福愛阿難從是天中有二岐路至如是一類名廣果天從福愛天分為二岐一直往道趨廣果一迂僻道趨無想苦于先心不帶異執直修禪定使自無量光天至福愛所修福德圓明而住則此天定福彌廣故名廣果若於先心雙厭苦樂至如是一類名無想天無想天乃岐路所分先心雖能伏惑修禪而涉妄帶異以有心為生滅以無想為涅槃於是雙厭苦樂專研捨心以趨無想由物泊身以至心想一切皆捨心慮灰凝成無想定以是感報生無想天壽五百劫初生此天未全無想經半劫始無及報將盡復經半劫有想然後報謝阿難此四勝流一切世間至功用純熟名為四禪想念之心粗曰尋細曰伺初禪三天兼之大梵無尋惟伺二禪無尋伺有喜樂三禪離喜樂有出入息尋伺感火喜樂感水出入息感風四禪兼而離之故不為三災所動名不動地然彼器非真常情俱生滅雖非無為真境而有為功用至此已純熟矣五不還天阿難此中復有五不還天至衆同分中安立居處第三果人斷欲界惑盡即生此天不復欲界受生故名不還亦名天淨居習氣種子惑也與現行俱盡此指欲界無續生業也苦樂雙忘兼指四禪以下無欲滅業也此五天自四禪別立通名捨念清淨地阿難苦樂兩滅鬬心不交如是一類名無煩天有厭有捨猶是心與境鬬不能無煩惟心境兩釋煩惱斯斷機括獨行研交無地如是一類名無熱天盛熱曰煩微煩曰熱上雖鬪心不交猶有交地此則心機無對故研交無地能滅緣影故得無熱十方世界妙見圓成至如是一類名善見天能滅緣影故妙見圓澄而染心塵像纍性沉垢一切俱無圓見十方故名善見精見現前陶鑄無礙如是一類名善現天定慧精明融鍊自在究竟羣幾窮色性性至如是一類名色究竟天幾者色之微性者相之本未能究了則局於色相自為限礙此能究而窮之故出乎形礙入無邊際名色究竟阿難此不還天彼諸四禪至自此以還名為色界下天修有漏凡定此天修無漏聖業粗細有異故不能得見獨行無交者離欲染也未盡形纍者尚有色質也無色界四天空處識處無所有處非想非非想處無業果色有定果色依正皆然乃滅身歸無定性聲聞所居或無想外道之別報或捨厭天人之雜處其類不一皆無色蘊分岐超出復次阿難從是有頂至名為回心大阿羅漢色究竟天居有色頂與無色鄰名色邊際二岐一出三界即此科也一入無色即次科也四禪皆依捨念修定此言捨心指有頂因心也因心能發無漏智慧斷盡塵惑至於圓明即出三界不住小果入菩薩乘是名回心大阿羅漢隨定趣入此有四天皆依偏空修進初厭色依空二厭空依識三色空識等都滅而依識性四依識性以滅窮研而不得真滅是皆有為增上善果未出輪回不成聖道若在捨心捨厭成就至如是一類名為空處此等依捨不修智慧厭己形礙堅修空觀滅身歸無即厭色依空者也名空處定諸礙既消無礙無滅至如是一類名為識處諸礙既消而無則不依于色無礙之無亦滅則不依于空唯留阿賴末那即厭空依識者也名識處定故報生識處賴耶第八識也末那第七識也身根既消無復六識故唯二者獨留而末那所緣色空識三此位厭色空而依識則色空粗緣已無故唯全半分微細空色既亡識心都滅至如是一類名無所有處前位能亡空色而未滅識心此則都滅故十方寂然逈無所往此雖亡識心未亡識性今之行人見性不深多滯于此雖能洞了色空灰滅心慮逮無所有而終于識性幽幽綿綿不能自脫生死窟穴實存乎此識性不動以滅窮研至迷漏無聞便入輪轉識性者識心幽本也不動者寂無攸往也既能不動復窮研使滅然依識滅之竟非真滅是強于無盡中發明盡性所以似存不存似盡不盡似存不存故非想也似盡不盡又非非想也此又幽幽綿綿至細之相以綿微不脫故云不盡空理而聲聞依此以為究竟終成鈍果外道依此無所歸宿終迷有漏修出世心至此終極粗業已無唯識性為滯苦奮然脫此斯出三界矣然此但示凡淺升進苦深智體之亦可頓超真證阿難是諸天上各各天人至回向聖倫所修行路通指欲色無色天也阿難是四空天身心滅盡至補特伽羅各從其類三界由妄發生七趣由妄取著補特伽羅此云數取趣即妄取之幽本也修羅趣復次阿難是三界中至云何更隨殺盜淫事此以殺盜淫三為根本無是業則名天趣言必升也有是業則名鬼倫言必墜也七趣舉二以善惡通攝因有而墜以無而升故曰有無相傾起輪回性若得正定則妙性常寂無復輪回矣有無二無言相傾業斷也無無亦滅言分別情忘也業斷情忘則三種妄本名迹雙泯矣故欲斷妄輪須修正定也阿難不斷三業各各有私至若他説者即魔王説詳辨魔境第二十九魔謂五魔境謂陰境然必境受其邪然後魔乘其便故須詳而辨之魔境開之有五曰陰魔煩魔惱生死魔天魔鬼魔合之惟陰魔天魔而已陰魔即生死煩惱依五陰而起者也天魔即修邪定好害正道者也即時如來將罷法座至皆是迷頑妄想安立化迷謂隨迷轉變也當知虗空生汝心內至況諸世界在虗空耶空生大覺中如海一漚發又喻片雲以明世界虗幻微芒易以消殞也汝等一人發真歸元至所有國土而不振裂真元之體本自廓然虗空國土皆是迷頑妄想安立發真不迷則無安立故自消殞一切魔王及諸鬼神至如何敢留惱亂禪定以後皆言悟則無咎蓋謂是也若不明悟被陰所迷至宛轉零落無可哀救破五陰現境一色陰阿難當知汝坐道場至此則名為色陰區宇陰以覆蔽為義區局性真故名區宇吳興指此屬為觀行此蓋禪那得力之處塵勞暫息之時定力雖爾而色陰未破故如明目處暗若目明朗十方洞開至堅固妄想以為其本五陰盡相非滅身歸無乃觀力洞照不為迷礙而已最初一念空見不分名為劫濁乃色陰之體也故色陰盡則能超之色陰者始因父母與己三妄倫交結故曰堅固妄想以為其本色陰現境五陰現境皆汝心中成就破亂只在迷悟之間故今詳示使不著邪見其目有十阿難當在此中精研妙明至若作聖解即受羣邪此段純是魔境與前九不同阿難如是十種禪那現境皆是色陰用心交互故現斯事衆生頑迷不自忖量謂言登聖大妄語成墮無間獄汝宜保持覆護無令天魔得其方便二受陰阿難彼善男子色陰盡者見諸佛心如鏡中現像若有所得而未能用猶如魔人手足宛然見聞不惑心觸客邪而不能動此則名為受陰區宇受以領納前境為義已破色陰內外虗融故能見諸佛心見諸佛心即我妙覺明心也如鏡現像謂清淨虗融了無形礙也雖具妙體而未能運用如魔𥧌人蓋為受所覆故若魔咎歇其心離身反觀其面去住自由無復留礙名受陰盡是人則能超越見濁觀其所由虗明妄想以為其本受陰消歇即能離身反觀去住無礙妄起見覺泊擾湛性名為見濁即受陰之體也故受陰盡即消之因違順之幻境生損益之妄受則受陰無體虗有所明故曰虗明妄想以為其本受陰現境其目有十阿難彼善男子當于此中得大光耀其心發明抑遏過分忽于其中發無窮悲悟則無咎非為聖證覺了不迷久自消歇若作聖解則有悲魔入其心腑失於正受當從淪墜此中受陰定中也既破色陰無復幽黯故得大光耀阿難又彼定中見色陰消受陰明白勝相現前感激過分忽于其中生無限勇其心猛利志齊諸佛悟則無咎非為聖證若作聖解則有狂魔入其心腑我慢無比失於正受當從淪墜又彼定中見色陰消受陰明白前無新證歸失故居智力衰微入中隳地逈無所見心中忽然生大枯渴于一切時沉憶不散將以此為勤精進相此名修心無慧自失悟則無咎非為聖證不則為憶魔旦暮撮心懸在一處失于正受當從淪墜受陰未盡故進無新證色陰已消故退失故居進退無依名中隳地以無依無見故枯渴沉想而招憶魔憶心妄系有如撮懸又善男子見色陰消受陰明白慧力過定失於猛利以諸勝性懷于胸中得少為足此名用心亡失恆審溺于知見悟則無咎若作聖解則有下劣易知足魔人其心腑見人自言我得無上第一義諦失於正受當從淪墜前以定強智微此又慧力過定皆互有所失又彼定中新證未獲故心已亡歷覽二際自生艱險于心忽然生無盡憂如坐鐵床如飲毒藥心不欲活常求于人令害其命早取解脫悟則無咎若作聖解則有一分常憂愁魔入其心腑或自割己肉或走入山林失於正受當從淪墜進退失守故心生艱險以成邪憂又彼定中處清淨中至失于正受當從淪墜又彼定中見色陰消受陰明白自謂已足忽有無端大我慢起此名見勝無慧自救悟則無咎若作聖解則有一分大我慢魔入其心腑不禮塔廟摧毀經像疑誤衆生入無間獄失於正受當從淪墜又彼定中圓悟精理得大隨順忽生無量輕安己言成聖得大自在若作聖解則有一分好輕清魔入其心腑自謂滿足更不求進此名多作無聞比丘疑誤衆生入阿鼻獄失於正受當從淪墜又彼定中於明悟中得虗明性其中忽然歸向永滅撥無因果一向入空空心現前乃至心生長斷滅解悟則無咎若作聖解則有空魔入其心腑乃謗持戒名為小乘菩薩悟空有何持犯飲酒噉肉廣行淫穢破佛律儀誤入人罪失於正受當從淪墜又彼定中味其虗明深入心骨忽有無量愛生愛極發狂便為貪欲無慧自持誤入諸欲悟則無咎若作聖解則有欲魔入其心腑一向説欲為菩提道攝其凡愚其數多滿千萬魔心生厭離其身體威德既無陷於王難疑誤衆生入無間獄失于正受當從淪墜結勸文同前色陰三想陰阿難彼善男子修三摩地受陰盡者雖未漏盡心離其形如鳥出籠已能成就從其凡身上歷菩薩六十聖位得意生身隨往無礙此則名為想質區宇想者心慮浮相識情妄習能覆妙明障聖道彼受陰盡者其心離身去住自由已能成就得意生身之因然尚為想陰所覆譬如有人睡𥧌寱言雖則別無所知而已成音韻倫次此想陰之相也寱音義若動念盡浮想消除至融通妄想以為其本無動則生滅想亡覺淨則始終念滅故一倫生死首尾圓照憶識誦習發知見塵名煩惱濁即想陰之體也故想盡則超之想能融變使心隨境使境隨心如想酢梅能通質礙故云融通妄想想陰現境其目有十首言天魔附人次及鬼魔兼附彼善男子受陰虗妙至訐露人事不避譏嫌邪定能具五通本業宿業畜生後報也此二宿命通知肇他心通訐露眼耳通口中好言未來禍福至頓希變易細相常住三惑盡者方棄分段生死得變易生死見楞伽經爾時天魔候得其便至保持覆護成無上道
