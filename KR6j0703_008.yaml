body:
  text: 淮海參佛弟子蘊空居士陸西星述旨廣陵後學陳治道校定三種修行漸次第二十六阿難如是衆生一一類中至具足如斯虗妄亂想三漸次功夫直到等覺地位皆此法門修入十二顛倒即動欲等汝今修證佛三摩地至三者增進違其現業五辛為助淫殺為正緣斷則違云何助因阿難如是世界至當斷世間五種辛菜段食謂食之有分段者又謂之摶食人食也觸食者鬼神食也但歆其氣而飽思食者禪天食也思之即飽識食者識天食也但以識想五辛楞伽云葱蒜韭薤興渠四在中國一在外國是五種辛熟食發淫至猶如毒蛇如見怨賊淫如毒蛇怨賊者以其能害法身殺慧命故先持聲聞四棄八棄至第二增進修行漸次淫欲相襲偷劫相負無由禁遏故禁戒成就二業永無云何現業如是清淨至是人即獲無生法忍流則分湛合塵不流則旋元無偶遂能反六用之擾復一真之湛無生法忍謂不見有少法生不見有少法滅離諸情垢無作無願安住是道名之為忍從是漸修隨所發行至第三增進修行漸次三增進一斷辛二斷淫三不緣塵故業淨性明乃可發行升進聖位增歷聖位第二十七五十七位各隨行相立名阿難是善男子欲愛乾枯至乾有其慧名乾慧地地謂地步言到此地步入聖有基所以不能優入聖域者只抂執心上執者守而不化之稱一味乾慧不如無智無得之為妙坐忘論云慧而不用實智若愚益資定慧雙美無極所以一味乾慧品為人位之初心要知乾慧之與金剛乾慧初無兩心溫陵之說近為江左太沖殷公所駁良有至理下文云始獲金剛心中初乾慧地猶云適得吾體也非等覺後心也故嘗擬之煉金三增進中如金雜沙礦銷之使盡只有一味金體從此加以鹽礬轉轉明淨即信住行向等心也如是礦盡即為真金不復重為礦矣到此始見十分精瑩本體故云始獲金剛心中乾慧初地謂始終洞徹因果圓成如經云等覺圓明是已金剛乾慧與前初心只是一心的非等覺後心也十信心豫按十信心即一心也但重重入妙耳非有等級之相懸可以循序而漸進者一信心住夫聖位以信為初因純真無妄之謂信又相應之謂信必先審中中圓妙之道以純真無妄之心體而行之使心法相應然後聖域可造也欲習初乾未與如來至中道純真名信心住欲盡乾枯根境不偶執心虗明直到乾慧地步猶在凡地未便與如來法流水接更當審中中道於如來薩婆海中中流而入中流謂不落邊際也如是則圓妙開敷從真妙圓之中不立所明便所發者皆是真妙如是則心法相應而妙信常住一切妄想滅盡無餘中中之道純真無妄故名信心住餘皆由此增進更無別法但隨位依真如性淨治惑習單復磨鍊使纖塵不立即登妙覺矣豫按十信法門皆依性而不依慧此慧而不用也然慧在性中所以審中中道者更是何物二念心住真信明了一切圓通至得無遺忘名念心住心真而明則一切圓通而陰等不礙故能洞照宿習憶念無遺三精進心妙圓純真真精發化至進超真淨名精進心妙圓通性既純既真則妄習皆化惟一精明而進乎真淨行無雜揉故名精進四慧心住心精現前純以智慧名慧心住五定心住執持智明周遍寂湛寂妙常凝名定心住六不退心定光發明明性深入唯進無退名不退心七護法心心進安然保持不失十方如來氣分交接名護法心八回向心覺明保持能以妙力至重重相入名回向心覺明保持即護法心也十方如來氣分交接是它來向我今回佛慈光向佛安住是我去向他故有雙鏡之喻九戒心住心光密回獲佛常凝至得無遺失名戒心住心光佛之心光也既密回於我則佛之常凝無上妙淨我得之矣此皆無作妙用復何為哉故曰安住無為無為故無得無得又何失名戒心住戒則有常自修省之意即此無為無作有何修省故戒心自此而住十願心住住戒自在能遊十方所去隨願名願心住戒心住故住戒自在對境無動涉事無染又何適而不可故遊行十方而所去隨願隨願滿足則無復有願矣故願心住溫陵曰修行之初必杜絶愛欲使心性虗明然後能入法流開妙圓性真性明圓細習乃現遂發行治之使純智無習又持之以定使湛寂發光深入於道護持不失斯能回佛慈光獲佛淨戒涉塵不染所去隨願此十信之序也十住從信趨入生如來家依無住智永不退還名之為住一發心住阿難是善男子以真方便至圓成一心名發心住真方便妙慧也十心十信心也十心頓發圓成一心住佛智地名發心住溫陵曰聖位以十信為初因以十住十行十願十地為漸次而終於等妙皆相躡而設欲令行人從信趨入而住佛智地依智起行濟行以願由是超三賢入十聖登等妙此修證之序也二治地住心中發明如淨琉璃至履以成地名治地住心中發明內外精瑩故有琉璃含金之喻履是妙心以為真基名曰治地如築室者必須治地乃可興作三修行住心地涉知俱得明了遊履十方得無留礙名修行住心地治成內外精瑩一涉所知無不明了任運遊行得無留礙四生貴住行與佛同受佛氣分至入如來種名生貴住妙行密契則妙理冥感將生佛家為法王族中陰以喻冥感之理亡者現陰已謝後陰未生此人自求父母入其胎中斯則陰信冥通生為佛種之喻五方便具足住既遊道胎親奉覺胤至人相不缺名方便具足住曰如中陰身曰如胎已成曰表以成人可見皆是譬喻六正心住容貌如佛心相亦同名正心住七不退住身心合成日益滋長名不退住八童真住十身靈相一時具足名童真住十身菩提身願身化身力身莊嚴身威勢身意生身福身法身智身自方便具足至童真名長養聖胎然皆譬喻之辭九法王子住形成出胎親為佛子名法王子住十灌頂住表以成人如大國王至陳列灌頂名灌頂住大國王太子則分委國事剎利諸王世子將付國位則取大海水以灌其頂溫陵曰發心者必治地治地乃修行修行然後生如來家具覺相同佛心長道體圓十身為佛子任佛事此十住始終之序也豫按十住但隨方便立名於乾慧中似有增進然皆無作功同長養聖胎俟其自在成就而已十行既依普智住佛所住遂能繁興妙行自利利它十行皆以度為體一歡喜行阿難是善男子成佛子已至十方隨順名歡喜行二饒益行善能利益一切衆生名饒益行三無嗔行自覺覺他得無違拒名無嗔恨行四無盡行種類出生窮未來際三世平等十方通達名無盡行種類出生化身周遍竪遍三世橫滿十方無窮盡也五離癡亂行一切合同種種法門得無差誤名離癡亂行於法不了曰癡於行紛錯曰亂今能一合於法得無差誤六善現行則於同中顯現羣異一一異相各各見同名善現行種種法門事理無礙互見隨應圓融自在可謂善現七無著行如是乃至十方虗空至不相留礙名無著行塵中現剎名現界不壞塵相名現塵此由善現行中克擴圓融也八尊重行種種現前咸是第一波羅蜜多名尊重行種種所現皆是般若德性無作妙力自在成就第一波羅蜜金剛經指般若言九善法行如是圓融能成十方諸佛軌則名善法行十真實行一一皆是清淨無漏一真無為性本然故名真實行總括前行無非真性本然妙用相雖萬殊體為一真故名真實如是十行乃至後位不離前法而皆相躡要使行人隨位增進開擴性覺淨治惑障而成熟佛果也十回向前十住十行出俗心多大悲行劣此須濟以悲願應俗利生回真向俗回智向悲使真俗圓融智悲不二進修妙行至此極矣一救護衆生離衆生相回向阿難是善男子滿足神通至衆生離衆生相回向神通滿足成佛事已當修回向之行謂回無為心向涅槃路也蓋以回向之行悲願最深然職在度生而見有衆生可度即涉有為金剛經所謂即著我人衆生壽者故須除滅度相不見有衆生得滅度者方為妙也二不壞回向壞其可壞遠離諸離名不壞回向壞其可壞遠離一切虗空境界也遠離諸離謂離遠離幻亦復遠離也得無所離則除諸幻而證不壞矣三等一切佛回向本覺湛然覺齊佛覺名等一切佛回向無壞不壞無離不離乃湛然齊佛四至一切處回向精真發明地如佛地名至一切處回向前覺等一切則真如體也此地至一切則真如界遍也五無盡藏功德回向世界如來互相涉入得無礙名無盡功德藏回向真界真體二俱圓遍故涉入無礙任運發揮德用無盡六隨順平等善根回向於同佛地中各各生清淨因至隨順平等善根回向佛地既同性何殊別故各各有清淨善根依用發揮皆可成佛七隨順等觀衆生回向真根既成十方衆生至等觀衆生一切衆生回向真性圓融周遍法界故十方衆生皆我本性我善既成故能成就一切衆生善根得無遺失無有高下各隨順等觀八真如相回向即一切法離一切相至名真如相回向二無所著不即不離乃真真如地九無縛解脫回向真得所如十方無礙名無縛解脫回向十法界無量回向德性圓成法界量滅名法界無量回向初證德性以為齊佛以為如佛以為至一切處皆存量見則法界性未離有量及乎德性圓成可超三賢入十聖矣四加行三賢位極當於此際加功行即入聖位然前云無作功用到此復有何功行可加此但優柔厭飫使自得之而已加行乃不加之加無功之行溫陵謂復加功行以求正證還有商量阿難是善男子盡是清淨至次成四種妙圓加行四十一心指上乾慧及信住行向各十為四十一心一暖地即以佛覺用為己心至欲燃其木名為暖地佛之正覺不見一人可度不見少法可得以此為心可謂心與佛齊覺成佛覺矣然猶未敢以為證以為得也此時猶如鑽火欲出未出將燃其木但不知火何時而出木何時而燃但養此溫暖以俟火出名為暖地儒書中程子曰到此地位功夫猶難大段著方不得此顏子所以有末由之歎也二頂地又以己心成佛所履至下有微礙名為頂地前以佛覺為己心此以己心成佛行若依非依言無所執著也因果未融心迹尚滯然已到頂地矣頂地之上即是虗空三忍地心佛二同善得中道如忍事人非懷非出名為忍地己心佛覺融為一體故曰二同因果兩忘二邊不立故曰中道而此中道果覺將證未證如忍事人已證則出未證尚懷非懷非出作何情思曰暖曰頂曰忍可謂善名狀矣四世第一地數量消滅迷覺中道二無所目名世第一地前謂二同則已落數量見有中道則猶分迷覺此俱泯滅而名亦不立脫世情量超於三賢故名世第一地十地一歡喜地阿難是善男子於大菩提至盡佛境界名歡喜地由前四十一心加行妙圓則如來妙覺可慶圓成矣故地名歡喜二離垢地異性入同同性亦滅名離垢地異性入同不見有異也同性亦滅不見有同也見同見異皆是情垢此同尚不有何況有異故地名離垢三發光地淨極明生名發光地四焰慧地明極覺滿名焰慧地如大火聚一切緣影悉皆爍絶故名焰慧五難勝地一切同異所不能至名難勝地前異性入同同性亦滅猶有能至之境此為焰慧爍絶永無邊徹一切異同所不能至故地名難勝六現前地無為真如性淨明露名現前地同異不至則真如之性明露現前七遠行地盡真如際名遠行地遠行則不見涯際真如無際現前則局盡際乃遠耳八不動地一真如心名不動地一真常凝故地名不動九善慧地發真如用名善慧地至亦目此地名修習位結前顯後也自初發信至超賢入聖皆修習之事而此位已超八地無功用道悲智並圓則修習之功終畢於此故此九地名修習位以結十地之因次後乃十地之果十法雲地慈陰妙雲覆涅槃海名法雲地十地果滿智悲功圓無復自利純是利他故大悲之陰充滿法界無心無緣而應彼心緣施行利潤而本寂無作稱合如來大寂滅海故云覆涅槃海如來逆流如是菩薩順行而至覺際入交名為等覺十地菩薩混俗利生與如來同而所趨順逆與如來異蓋如來逆生死流出同萬物菩薩順涅槃流入趨妙覺但已入覺際則與佛無間矣入交謂覺際相交也以其順流故名等覺等覺言與佛等也若逆流而出妙同萬物則名妙覺矣阿難從乾慧心至等覺已至金剛心中初乾慧地金剛心中初乾慧地不特一味乾慧而已一味乾慧但是初因加以四十一心妙圓加行𣷉養純熟至於等覺地位方能盡此乾慧之量故云始獲初心乃因之果也蓋初之乾慧譬之蓄火此則焰慧熾然充滿大千然後能盡火之量到此始得元初一點蓄火之力經意似是如此故環師諸說皆在所簡或問四十四心皆不言慧者何曰戒定與慧佛之三無漏學也四十四心之中審中中道者非慧邪有時發光發焰者非慧邪但慧而不用實智若愚耳又乾慧即般若舍是則入聖無繇矣不用者韜光不露乃養道之方也如是重重單復十二方盡妙覺成無上道復即重義十二恐宜當作十四信住行地回向皆十也四即加行吳興以二為乾慧等覺而遺十回向豫意未妥又按溫陵重歷諸位之說竊有疑焉道之增進也如土長苗始培其根終結其果一氣呵成既到果地不應又復歸根重新長養一番方始成熟況十信十住等位由淺而深由生而熟由勉而安自有次第重歷則為爛飯重嚼何異學生念書已熟又復重溫一遍大修行人恐難與童蒙學究同論也是種種地皆以金剛至清淨修證漸次深入金剛即金剛乾慧心也種種地十四位也十喻者幻人陽𦦨水月空華谷響乾城夢影像化奢摩他毗婆舍那此云正觀了法如此則頓忘情解纖塵不立故曰清淨修證阿難如是皆以三增進故至若他觀者名為邪觀三增進三漸次也聖位資之以成就五十五位信住地行向為五十乾慧位及四加行為五十五爾時文殊師利法王子至身心快然得大饒益阿難自敘大衆聞經獲益開示密印至增上妙理通指前經奧義印證藏心清淨含覆一切決了是謂密印般怛囉義也以明心見性為因等妙極證為果情解兩忘心慮灰凝細惑頓斷是謂禪那進修增上妙理修道所斷俱生細惑大乘八地永伏至佛地方斷小乘分二果分為九地地各九品初果斷欲界前六品而證二果斷後三品而證三果斷上三界各九品而證無學今此增上頓斷故言三界六品其餘三品必須佛地方斷雖三果能斷九品特分段漸伏而已精研七趣品第二十八前說真淨妙心本來周遍則法界一真萬物一體宜無諸趣之異其如方今現有乃常情所疑故或執諸趣而迷妙圓之體或執妙圓而撥諸趣之業以致失錯墮落故特請問欲人詳明而知所戒備也獄趣世尊若此妙明真淨妙心至為是衆生妄習生起自妄發生非本來有世尊如寶蓮香比丘尼至歡喜頂戴謹潔無犯不斷三業各各有私衆同分中非無定處佛告阿難快哉斯問至男女二根自然流液性動於內曰情故情為內分情人之陰氣有欲者也因諸愛染而起能滋愛水潤業潤生輪回不斷職由於此阿難諸愛雖別流結是同至自然從墜此名內分水性潤下故情積之業多從淪墜阿難外分即是衆生分外至自然超越此名外分意緣於外曰想故想為外分想人之陽氣有冀者也故因渴仰而復以陽積故能生勝氣吳興云外分不出三界雖云聖境冥現但是勝氣之習非真聖境也阿難一切世間生死相續至無食無飲經百千劫雖得水飲亦化為火故能害己九情一想下洞火輪至重生無間二種地獄洞火輪即入熱獄入風火交過地謂超寒獄入熱獄熱獄第八曰五無間純情即沉入阿鼻獄至更生十方阿鼻地獄阿鼻此云無間謂受罪苦具身量劫數壽命五者皆無遮間名五無間此惟情量最重者墜入劫壞乃出若兼謗大乘等罪此劫雖壞更入十方阿鼻地獄永無出期循造惡業雖則自招衆同分中兼有元地答前問為有定處純情所造雖則自招同業所感不無定處各隨元由也阿難此等皆是衆生自業所感造十習因受六交報十因十習之業皆先言所感之境次言所報之事云何十因阿難一者淫習至菩薩見欲如避火坑如來為導師故色目以警之菩薩為行人故深怖以避之二習具彼此與交字相映二者貪習交計發於相吸至菩薩見貪如避瘴海貪因愛心計著吸取而發吸積風為寒風結水為氷故有積寒凍裂之境吒吒波波羅羅忍寒之聲青赤白蓮寒氷之色此為寒氷地獄三者慢習交陵發於相持至菩薩見慢如避巨溺慢者自見自是先己後人謂上無可事之君下無可使之民中無可交之友輕世傲物浩然長往如水之馳流不息莫可挽回驕佚奔波馳流不息之像也慢為魔民魔能害物故血河灰河熱沙毒海以成其毒慢能滋癡堅明立礙故融銅灌鐵以食其報癡水西國水名四者瞋習交衝發於相忤至菩薩見瞋如避誅戮心屬火氣屬金瞋者以心使氣而反動其心加之衝擊抵牾則心火轉盛金氣轉剛故曰心熱發火鑄氣為金也斷刑曰宮肉刑曰割五者詐習交誘發於相調至菩薩見詐如畏豺狼詐習因奸智起惡而漸漸滋蔓如水浸田草木滋長由調引相延故感繩木延引之報六者誑習交欺發於相罔至見諸虗妄如臨毒壑見習有五一薩迦耶此云身見謂執身有我種種計著二邊見於一切法執斷執常三邪見邪悟錯解撥無因果四見取非果計果如以非想為涅槃五戒禁取非因計因如以持牛犬戒為生天因五者總名惡見順邪反正故云發於違拒出生相反由其違反故感王吏執證之境權作推鞠之報路人相見一去一回喻所見違反也五惡見能陷法身故名見坑九者枉習交加發於誣謗至菩薩見枉如遭霹𮦷排擠銼也漉瀝也衡橫也謂迫蹙其體瀝漉其血又以迫隘苦具橫衝而度十者訟習交喧發於藏覆至如戴高山履於巨海訟非官訟公發其覆之謂也六報六報多有不可曲解故但存其本文阿難一切衆生六識造業至受無量苦經無量劫極重六根各造及彼所作兼境兼根是人則入八無間獄次重即八熱獄同於六根具造十因兼境兼根名惡業同造其罪極重故入阿鼻具五無間各造則有先後間歇故為次重入八無間有心而不及犯則不兼境無心而誤犯則不兼根故作特犯兼二者身口意三作殺盜淫是人則入十八地獄三重罪以不遍六不具十故又次於前十八鬲子地獄皆大獄所分又次重三業不兼中間或為一殺一盜至則入三十六地獄稍輕見見一根單犯一條是人則入一百八地獄次輕由是衆生別作別造至獄想發生非本來有上文五節惡業不同即別作別造也所感獄報各從其類即入同分地也妄想發生並酬阿難前所疑問鬼趣六報之後罪畢受形復次阿難是諸衆生至後還罪畢受諸鬼形非破律儀無正犯也犯菩薩戒無正因也毀佛涅槃無正果也三者不正諸餘皆邪故為墮獄入鬼若於本因貪物為罪至則妙圓明本無所有畜生趣復次阿難鬼業既盡至生於世間多為咎徵凶事前驗如商羊舞水畜魅之鬼畜死報盡至生於世間多為食類充餽之物綿幽之鬼幽消報盡生於世間多為服類吞蚌狐貂馬牛之物和精之鬼和消報盡生於世間多為應類社燕寒鴈之類明靈之鬼明消報盡生於世間多為休徵麟鳳之類依人之鬼人亡報盡生於世間多為循類猶犬雞豚之類馴服於人者阿難是等皆以業火乾枯至皆為浮虗妄想凝結人趣復次阿難從是畜生至生人道中參合達類文明達三類皆便巧雜伎世智辨聰者非大賢大聖也是等皆以宿債畢酬至此輩名為可憐愍者仙趣阿難復有誤人不依正覺至報盡還來散入諸趣
